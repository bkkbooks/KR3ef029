body:
  text: 卷二寒五名凡人之所病者通謂之疾指曰邪名曰寒寒即邪之名也而義之所歧凡五焉邪有輕重而統以為寒析以為風風其最輕焉者也寒其最重焉者也故風自寒析惟寒統之矣是乃傷寒中風之辨也寒又有內外之別矣而其自外焉者必能為熱此為之陽也其自內焉者必能為寒此之為陰也寒即裡寒之寒以吐利言之矣是乃內外之辨也寒也者邪之名也而義之所歧凡五焉有指邪氣者有指痰飲者有指吐利者或對熱或對溫如曰傷寒曰寒去欲解曰寒實曰被寒曰胸有寒曰里有寒曰寒格則皆指邪氣者也如曰寒飲曰久寒曰胃上有寒則皆指痰飲者也如曰寒分曰寒下曰裡寒曰藏有寒曰寒多則皆指吐利者也如曰惡寒曰往來寒熱曰寒少則皆對熱者也如曰手足寒曰厥寒曰藏寒則皆對溫者也凡寒之歧為五義者若此矣而統為傷寒析為中風外焉而熱內焉而寒雖如不均而其實則一也一也者何一寒而已寒也者邪之名也能為此數者之疾而病人者惟邪而已故以寒為邪之名者正義為然矣後之説傷寒者深泥寒字以為非觸冒冬時嚴寒之氣則不得名為寒也於是乎遂至有其即病者為傷寒不即病而其寒毒藏於肌膚至春變為溫病至夏變為暑病之説嗚呼此何以知其即病之與其不即病而其寒毒之藏於肌膚至春至夏而變乎倘能知焉乎不若速施之治而不使其寒毒之藏於肌膚也又何俟其至春至夏而變乎誰謂素難之不妄乎今審仲景氏之所論未嘗問四時雖其邪之或自外焉或自內焉而統名為傷寒焉寒也者邪之名也故不問四時統名為傷寒者是為正義矣奚翅觸冒冬時嚴寒之氣焉已矣哉傷寒之名蓋自古有之矣仲景氏據而述焉已矣風溫溫病雖載之於太陽篇而徒論其被下被火之逆不及其方法也然則其所謂風溫溫病者何方之處乎此惟以寒為嚴寒之寒不辨傷寒中風之為輕重與自內自外之為寒熱而不知一寒之統名於邪之為古義而強為之説者也不可從矣三陽三陰三陽三陰者表裡之統名也外內之分也凡疾病之於變千狀萬態不可得而窮極焉雖然其所統者不出乎陰陽也雖乃不出乎陰陽而又不能無淺深緩急於是各歧而為三矣而又喚三陽以表裡是惟喚之在三陽而非謂陰陽以統之表裡也夫三陽之為表也固矣而其所主在熱而其脈則浮然其熱亦不一而其所名而喚者凡十二而其所統者五雖乃統之於五而非若配之五藏之類也要亦不出其表裡之二焉惡寒發熱為太陽為表是其在三陽最淺而最緩也往來寒熱為少陽為表裡是其在三陽其表稍深於太陽而其里稍淺於陽明所以為之半也此二者必兼惡風寒也論曰有熱惡寒者發於陽是也身熱惡熱潮熱為陽明為里是其在三陽最深而最急也此獨無有惡風寒也若尚有焉則是為其表未解也例曰微惡寒者表未解是也故太陽為表之表而陽明為表之裡也若乃以其淺深緩急之次則當自太陽及少陽自少陽及陽明而反篇少陽於後者蓋欲先示其為表裡也三陰之為里也固矣而其所主在寒而其脈則沉寒即裡寒之寒而以吐利厥冷言之也然其寒亦不一而其以淺深緩急歧而為三者亦猶三陽也而不可復以表裡言之也則直舉其形狀而示之也腹滿而吐食不下自利腹痛手足溫而不渴是為太陰此其於三陰甚淺而甚緩也此無有發熱也若脈浮發熱則取之於表也例曰太陰病脈浮者可發汗宜桂枝湯是也脈微細但欲寐欲吐不吐心煩自利而渴手足寒或咽中痛是為少陰比之太陰則稍深而稍急也此亦無有發熱也若反發熱則亦取之於表也論曰少陰病始得之反發熱脈沉者麻黃附子細辛湯主之又曰少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗是也脈太微或全無消渴氣上撞心心中疼熱飢不飲食吐利甚四支厥逆是為厥陰比之少陰則太深而太急也此雖有發熱微熱外熱而皆屬身熱頗殊太陽之發熱也且其脈之與厥冷亦不相似也遠矣三陰亦有惡風寒而無發熱為其分論曰無熱惡寒者發於陰是也此專乎少陰而言之也如厥陰則篤危之極也而有寒有熱焉少陰亦不為不篤危而不若厥陰之甚少陰亦不為無寒熱而不若厥陰之甚不惟寒之極能為厥而熱之極亦能為厥是以特擅之厥陰也雖均為厥乎寒熱之分不可不辨矣夫三陽之主熱也惟以惡風寒辨其表裡三陰之主寒也惟以發熱辨其表裡此為法矣且有始於熱而之於寒者有客於寒而主於熱者乃三陽中論三陰之方證三陰中載三陽之方證交往交來而能變能化是乃張仲景氏之術之機活也亦不可不審矣由是而觀之雖於三陰不言表裡而在其淺深緩急之次太陰則里之初也少陰則里之本也厥陰則里之末也本末猶表裡也若以三陽三陰合而言之二陽則始而二陰則終也而二陽為表裡二陰為本末惟少陽太陰為之間而少陽間於二陽太陰間於陰陽此其所以篇少陽於後媲之於太陰也凡是皆統之於陰陽各歧而為三次其淺深緩急以示之轉機使人易辨別者也夫三陽三陰者表裡之統名也外內之分也而表裡之外非更有陰陽也如曰發於陽曰發於陰曰陰陽俱虛曰陰陽自和皆以三陽三陰言之豈在表裡之外乎夫疾病之於變雖千狀萬態不可得而窮極乎靡不惟陰陽之統焉體之於大而為陰陽體之於小而為表裡大以創之小以成之矣故陰陽者表裡之統名也表裡豈非外內之分乎後世陰陽之説紛紛紜紜加之以五行欲以中仲景氏之論豈其不益迂也矣哉六經之名出於素問本是經絡之義各有其部位存焉蓋自古有之矣仲景氏乃假此以分表裡之部位配其脈證而為之統名也惟是假之於經絡是以視以為經絡則莫之非經絡也雖然尋仲景氏之所論專在外內之分而非取之於經絡則其於本旨宜喚為三陽三陰爾又奚以六經稱之之為或曰或稱六經或喚三陽三陰本是一也則稱六經宜如無害然奚更喚三陽三陰之為曰不然六經本以經絡名焉而仲景氏假之表裡之統名則雖其所指之不異而其所推之不同也故取之經絡焉則遠推之於理也取之表裡焉則邇推之於事也推於事之與推於理也固非無徑庭矣與其趨理於遠寧從事於邇是故不稱六經而喚為三陽三陰者此蓋仲景氏之本旨也傷寒中風三陽三陰本是為辨傷寒之狀而所設也凡疾病之將速至篤危者孰若傷寒之最太甚也是故先於百病者惟傷寒而已張仲景氏之建規則也以傷寒為主焉惟是以傷寒為主而又既不能無輕重也於是乎謂其重者為寒謂其輕者為風寒曰傷風曰中亦惟輕重之別已乃其於脈證也亦既不能無寒熱也於是乎謂熱為陽謂寒為陰陽曰浮陰曰沉亦惟寒熱之分已乃其熱之與寒亦既不得不之而復之也於是乎各歧而為三雖乃歧而為三而又既不得不相交或及也於是乎立合之與並以盡其變矣而其又復愈之而愈變也變之又變不得不遂之於雜脈證矣夫既歧陰陽各三而名三陽以表裡以確其淺深也如三陰則緩急直至故鮮及表裡者矣張仲景氏之建規則也以傷寒為主焉而又辨其輕重而出中風也則傷寒中風惟是輕重之別已然後凡之所統也惟在寒熱之分而不出於陰陽二者焉夫惟統之於陰陽而建之規則也若此可謂簡且約矣能察其機而制其變者其惟張仲景氏之術耶苟欲為仲景氏之所為也厝其規則將焉是依不可不慎而守也慎之不外守之不內是之謂能循規則矣若夫傷寒中風之於別也惟舉其脈證於太陽之篇首而不舉之於陽明以下何耶傷寒中風惟是輕重之別已而三陽三陰各有其脈證具焉則其於脈證未嘗無輕重焉然則各就其脈證而較其輕重則傷寒中風之別可以辨知焉爾矣於三陽三陰太陽為之首故舉其脈證於此而示其輕重之別以例於陽明以下至於厥陰也合病並病三陽三陰以統其外內也又系三陽以合併二者而辨其相交或及也於是乎脈證無有所遺焉蓋合也者謂在其始也而既已太陽陽明及少陽之脈證之相交見者也並也者謂未離於太陽之脈證薦及於陽明少陽者也之二者之於輕重緩急也合病為最重最急矣並病之於合病雖若稍輕稍緩乎不若太陽之最輕最緩也故並病亦不為不重且急矣以其薦及於陽明少陽也合病之所以最重最急者以其始而既已交於陽明少陰也此皆三陽之變脈證也乃其治之也亦各有法焉故其於合病也論曰太陽與陽明合病者必自下利葛根湯主之又曰不下利但嘔者葛根加半夏湯主之此皆雖其邪之既在於陽明誘諸其表於發汗者也又曰太陽與陽明合病喘而胸滿者不可下麻黃湯主之此雖其邪之實於胃先誘諸其表於發汗然後下之者也又曰太陽與少陽合病自下利者黃芩湯主之此以其邪之客於中位不宜發汗亦不宜下故惟於中間而制之者也又曰三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿若自汗出者白虎湯主之此以其邪之熾於二陽不宜發汗亦不宜下故挫其勢於裡者也是皆治合病之法也其於並病也例曰二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗此雖其既及於陽明而其表之未除也必先其表而後其里故復例之曰外證未解者不可下也下之為逆論曰二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈宜大承氣湯此俟其表之已除而後攻其里者也此其一則太陽證未罷一則太陽證已罷純於陽明此皆先表而後里者也例曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語又曰太陽少陽並病心下鞕頸項強而眩者當刺大椎肺俞慎勿下之又曰少陽不可發汗吐下發汗則讝語吐下則悸而驚論曰本太陽病不解轉入少陽者脅下鞕滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯此以其客於中位發汗吐下皆非其所宜故惟於中間而制之者也是皆治並病之法也二者之於治法其有先後若此故合併之設名以別之者以此其治法有先後也夫既三陽有合併之名而三陰獨無有者何耶曰合併之為名其相交或及者也而三陽有之則三陰亦不得無言焉惟不設其名耳設其名者以治法之有先後也不設其名者以治法之一於救里而無有先後也故仲景氏之設名也莫不關於治法焉故三陽三陰之於名此其治法之綱而合病並病之於名此其治法之目也三陽之相交或及也比之三陰雖急而猶緩此其治法所以有先後也三陰之相交或及也其證雖緩卻是已急此其治法所以一於救里也故非惟三陽有合病並病三陰亦有之惟不設其名耳三陽之設合併之名也必關於治法焉假如二陽並病其始也是太陽證而既及於陽明則陽明似可攻然太陽未離則先發其汗而後攻其陽明此之為法也於是既離於太陽也謂之陽明病既純於陽明也無有並之名故並病者未離於太陽之名也如太陽少陽並病及少陽陽明並病則於少陽制之此之為法也並之於名豈非關治法之有先後乎如三陽合病則或於少陽制之假攻陽明不以承氣而以白虎此之為法也故例曰發汗則躁心憒憒反讝語此言桂麻之不可行也又曰下之則額上生汗手足逆冷此言承氣之不中攻之也合之於名亦豈非關治法之有先後乎他尚有不曰合病並病而所謂合病並病者亦當因此而推之而已三陰之不設合併之名也直舉其脈證以具之治法惟於太陰及少陰其治法有一二似有先後之序者論曰太陰病脈浮者可發汗宜桂枝湯又曰少陰病始得之反發熱脈沉者麻黃附子細辛湯主之又曰少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也此或以脈浮或以發熱皆取之於表也於厥陰則變先後之序先其里而後其表論曰下利腹脹滿身體疼痛先溫其里乃攻其表又曰傷寒醫下之續得下利清穀不止身疼痛急當救里後身疼痛清便自調者急當救表例曰下利清穀不可攻表汗出必脹滿此以身體疼痛為表也又霍亂之於治法亦然是皆陰陽之相交或及者而治法之有先後者也他尚有其相交或及或自熱而之寒或表寒而裡熱者凡是等之類若命之名則亦當曰陰陽之合病並病而今不設其名者以治法之一於救里也其有先後者僅不過二三何則陰陽之脈證與治法之殊異固不可同其名也而其有合併之實亦不可異其治法是以三陰不言合病並病而亦有治法有先後者也夫三陽表也而其中有表裡以先後其治三陰里也其治法一於救里故不言表裡是故三陰不言合病並病亦猶其不言表裡也時或言里證者不得已者也要在於隨脈證則又何煩命之名拘此而施其治之為惟是體之於大此之為陰陽體之於小此之為表裡雖其脈證之裂及於百千乎莫不統而盡焉故如合病並病亦皆依於茲矣如曰轉屬曰轉入曰轉系則惟於並病乎言之也假令其始於太陽薦及於陽明少陽也二證之相侔是其並病也既離於太陽而純於陽明少陽是之為轉也既轉而未純是之為屬也故轉入者其既純焉者也轉為轉系者其未純焉者也可見並病之輕於合病合病之重於並病也乃其於治法先太陽而後陽明非太陽則少陽惟其一證而一方仲景氏之所為大抵為然豈有並二三而治之之術也哉其析陽明而為三建太陽陽明少陽陽明正陽陽明之目者蓋出乎後人之杜撰也其如正陽陽明則姑舍旃惟其為太陽陽明為少陽陽明者此何所異乎並病也夫既載合併二者於三陽而辨其相交或及也莫不盡而竭焉而又覆載之於陽明篇首更曰太陽陽明曰少陽陽明以混之名最為無謂也要之皆是三陽之變脈證則系之以合併二者以歸之於其一證而一方之治法庶乎不遺而恨焉豈可獨私之於陽明析以為三更建之目焉矣哉冒首邪之於人也不一而止焉或自外或自內或輕或重淺深之狀緩急之態奚止什佰而已哉於是乎重為寒輕為風其自外者為陽其自內者為陰陽主乎熱陰主乎寒熱之匹乎三以析淺深之狀寒之匹乎三以序緩急之態然後有傷寒有中風而三陽三陰之部位定矣部位既定而熱莫不趨寒莫不極熱有合併寒有兩厥變耶變耶雖之於千萬無有所遺也三陽三陰之於部位各有其脈證具焉乃舉其脈證於各篇之發端以例之於各篇之每條曰太陽之為病脈浮頭項強痛而惡寒曰陽明之為病胃家實也曰少陽之為病口苦咽乾目眩也曰太陰之為病腹滿而吐食不下自利益甚時腹自痛曰少陰之為病脈微細但欲寐也曰厥陰之為病消渴氣上撞心心中疼熱飢而不欲食是也各篇之每條引之以為冒首曰太陽病曰陽明病曰少陽病曰太陰病曰少陰病曰厥陰病是也三陽三陰之為病雖異其脈證而其邪即傷寒中風也夫傷寒中風輕重之別也三陽三陰內外之分也傷寒中風為之經三陽三陰為之緯是故特舉其脈證於太陽之發端以示其為輕重之別以例於陽明以下至於厥陰曰脈緩者名為中風曰脈陰陽俱緊者名為傷寒是也陽明以下至於厥陰亦例之以為冒首各篇之中曰傷寒曰中風皆是也故傷寒中風者邪之名也以明其通者也三陽三陰者其部位也以明其別者也而今系中風傷寒之名於各篇之部位則又如具一脈證然然此未必然也惟為其欲各就其部位而見其輕重故也凡冒首曰太陽病曰陽明病曰少陽病曰太陰病曰少陰病曰厥陰病曰傷寒曰中風之類皆統其脈證而言之也固矣各有其旨存焉豈徒任意而發之者哉姑以太陽言之惟標其本位者是之為太陽病也此或為中風或為傷寒其病之所在不出於太陽本位者也如桂枝湯麻黃湯葛根湯桂枝加葛根湯桂枝麻黃各半湯桂枝二越婢一湯大青龍湯等是也又有通於傷寒中風二者曰太陽病者如大小柴胡湯等是也又有其病仍不解復加他證者通之猶曰太陽病者如桂枝去桂加茯苓白朮湯葛根黃連黃芩湯桂枝加厚朴杏子湯桃核承氣湯抵當湯大陷胸湯十棗湯真武湯桂枝人參湯等是也又有前證已愈之後更見他證者亦通之猶曰太陽病者如桂枝湯其氣上衝者桂枝去芍藥湯及去芍藥加附子湯五苓散等是也此皆通於發汗後吐後下後而言之也又有直曰發汗後曰吐後曰下之後曰發汗吐下後曰大汗出後而不及冒首者如茯苓桂枝甘草大棗湯桂枝加芍藥生薑人參新加湯厚朴生薑甘草半夏人參湯梔子豉湯調胃承氣湯白虎加人參湯乾薑附子湯等是也此其前證已愈之後更見他證者通而言之也故皆曰後又有直曰發汗若下之曰發汗若下之病尚不解曰發汗病不解曰發汗過多曰大汗出而不及冒首者如梔子豉湯茯苓四逆湯芍藥甘草附子湯桂枝甘草湯桂枝二麻黃一湯等是也此皆其病之仍不解或復加他證者亦通而言之也故皆不曰後又不惟標其本位之重者或之於陽明或之於少陽或於少陰或於厥陰者皆通之為傷寒也如麻黃湯大小青龍湯小建中湯茯苓桂枝白朮甘草湯大小柴胡湯柴胡桂枝幹薑湯柴胡桂枝湯柴胡加芒硝湯柴胡加龍骨牡蠣湯屬焉半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯屬焉大黃黃連瀉心湯附子瀉心湯屬焉赤石脂禹餘糧湯五苓散黃連湯梔子豉湯梔子甘草豉湯梔子生薑豉湯梔子厚朴湯梔子乾薑湯屬焉大陷胸湯小陷胸湯屬焉調胃承氣湯大小承氣湯白虎湯白虎加人參湯屬焉桂枝附子湯甘草附子湯屬焉芍藥甘草湯甘草乾薑湯四逆湯通脈四逆湯茯苓四逆湯屬焉等是也又標其輕者各系之於其本位以為中風也曰太陽中風曰陽明中風曰少陽中風曰太陰中風曰少陰中風曰厥陰中風是也此二者惟標其輕重而已夫三陽三陰之於部位本是為傷寒中風之設也傷寒中風者邪之名也而未有其形之可見於是外內與淺深與緩急各歧而為三以形之也有形而後輕重自見矣此其所以系三陽三陰以傷寒中風也要之傷寒之於變也博是以其之於他者太多以其重也中風亦非無變也而不如是之甚是以各系之於其本位而已以其輕也其實則凡曰太陽病曰陽明病曰少陽病曰太陰病曰少陰病曰厥陰病者皆或以傷寒言或以中風言也又何深拘泥之為雖然不識此分別則不能審其位之在何之部而果輕耶果重耶然則此其分別亦復何容忽諸哉又有傷寒中風連言者如小柴胡湯甘草瀉心湯是也此以其始之雖於傷寒乎雖於中風乎遂及於此者言之也又有謂合病並病曰太陽病下之或曰發汗若下之或曰發汗吐下之後而不及冒首者如調胃承氣湯大小承氣湯大小柴胡湯等是也凡不及冒首者或有聯牽上冒首來當就而審焉已矣又有單曰病或曰病人者此以其例於他者與其有説於此者與其在初也脈證相措而位未可定者言之也如例曰病有發熱惡寒者發於陽也無熱惡寒者發於陰也則其例於它者也如論曰病人藏無他病時發熱自汗出而不愈者先其時發汗則愈則其有説於此者也如論曰病發熱頭痛脈反沉若不瘥身體疼痛當救其里則其在初也脈證相錯而位未可定者也凡是皆在太陽者之概也陽明以下至於厥陰亦皆可準知焉已矣惟少陰不曰傷寒似乎可疑然既有中風則不得言無焉乃今推其曰少陰病者咸是傷寒而標其本位者也是故曰始得之曰一二日曰二三日以明其創於茲也又奚疑之為厥之歧為兩也惟寒之與熱寒能為厥熱亦能為厥所以歧為兩也大抵三陽主乎熱三陰主乎寒無論寒之為厥至如熱之為厥則其所主當在於陽明而已而今措其所主而一之於厥陰者何耶夫雖熱之趨於陽明而厥固非陽明之位也何以篇之於陽明乎三陽三陰本是取證於外以定其部位者也厥者外證也雖內有兩歧乎不得不取之於外也雖則取之於外乎他有可以候之證而具則又奚可混乎此其所以一於厥陰也若果篇之於陽明則不啻不中其位得無以寒為熱之泥乎乃今一之於厥陰猶不得無以熱為寒之惑也我將臨之以他可以候之證而已雖厥之一於外而寒熱果殊於內矣豈可且泥且惑以混之哉厥之於寒熱也寒為其本位雖熱之非其本位乎臨之於外而一之於此不以厥陰為冒首而咸以傷寒為冒首者以其重之極故也故特於厥陰篇咸曰傷寒而曰厥陰病者少亦惟為之故也可見傷寒之重自有輕重中風之輕亦自有輕重及其之變也其輕者漸重其重者遂危熱之所趨寒之所極經緯於三陽三陰而千萬不遺也正屬三陽三陰之於脈證有正焉有屬焉而治法必從之何謂正乎專而無所兼是之為正如太陽之脈浮頭項強痛而惡寒陽明之胃家實少陽之口苦咽乾目眩此則三陽之正脈證也何謂屬乎或兼或不專是為之屬如曰本太陽初得病時發其汗汗先出不徹因轉屬陽明曰服柴胡湯已渴者屬陽明曰蒸蒸發熱者屬胃曰傷寒脈弦細頭痛發熱者屬少陽此則三陽之屬脈證也而三陰之於正之於屬亦猶三陽可以準知矣而三陽三陰之於脈證有正焉有屬焉而治法必從之惟於太陽與厥陰無屬脈證何也太陽則病之始也重為傷寒輕為中風交名合及名並此有及於彼而彼無及於此太陽之所以無屬脈證也厥陰則病之終也彼若及於此則既已危此何復及於彼厥陰之所以無屬脈證也脈候脈之為候也其所統亦惟不出於陰陽焉陽曰浮陰曰沉如緩緊遲數滑澀莫不繫於浮沉譬如經之與緯浮沉為經而以此先定陰陽之病位也緩緊遲數滑澀為緯而以此繼察其輕重緩急也是故三陽而浮三陰而沉緩為中風緊為傷寒此脈候之概也而其所候之處以寸口為本脈趺陽少陰副之此三者古之遺法也而脈法大備焉若其陰陽人迎關尺之義此皆醫法末路之失也何以言之凡脈候有以陰陽言者有以三部言者而其所謂陰陽亦不一也説者以為浮沉或以為尺寸浮沉即舉按之義尺寸即上下之別也夫陰陽也者表裡之統名而假以辨之證者也而今復假之於診法何其妄也若此陰陽但為浮沉之義則猶可必取之舉按則不可何則浮沉惟其動之昂低者而自在於彼自在於彼則候之而自知何必由我之且舉且按乎古聞切脈未聞舉按而況於以陰陽為舉按之義乎故但為浮沉之義則猶可必取之舉按則不可夫陰陽也者表裡之統名而假以辨之證者也而今又復假之於尺寸何其紛也取譬之不邇則無弗罔而其趨於多歧也亦無弗迷本是一陰陽也一譬之表裡而再譬之浮沉而三譬之尺寸則其弗罔且迷者幾希脈診之所以不彰於今也今夫審張仲景氏之所論惟曰脈浮浮緊浮緩浮數而不指其所候之在何處也惟曰脈沉沉緊沉細沉微而不指其所候之在何處也凡若此類皆不逮陰陽寸關尺者也而其以陰陽者僅三四其以寸關尺者亦不過五六然則其惟曰脈浮脈沉者之最多而其逮陰陽寸關尺者之最少也若必以陰陽寸關尺為不可不候者則其惟曰脈浮脈沉而不指其所候之在何處也何其粗且略耶三部亦其説之不一也或取三指一寸九分之間或取寸口至尺澤分陽分陰藏與府之配而察虛實死生也亦為可疑矣素靈無寸關尺之説但有寸口人迎而仲景氏不言人迎時言趺陽少陰也由是而觀之則古之於脈法未嘗逮陰陽寸關尺也陰陽寸關尺或肇於晉王叔和氏耶而叔和氏之於脈法立七表八里九道合為二十有四而今考之仲景氏之書陰陽寸關尺及二十有四之目皆現而存者何耶叔和氏之巧脈診私取其脈法以配之於本論自試其技者遂謬而混焉者耶不爾何惟曰脈浮脈沉者之最多而逮陰陽寸關尺者之最少耶若必以陰陽寸關尺為不可不候者則何惟曰脈浮脈沉而不指其所候之在何處也此豈非粗且略耶古之於脈法其詳不可得而知矣雖然觀乎其惟曰脈浮脈沉者之最多且不指其所候之在何處則其所候之處必當在寸口也而未必若後世三指取三部惟其候之也潛心於茲無敢失之輕易矣素靈無寸關尺之説但有寸口人迎而仲景氏不言人迎時言趺陽少陰也則其所候之處特為在寸口者此為不誣也糅之以趺陽少陰則脈法大備焉庶幾不大斁火於古耶若夫三部之説或取三指一寸九分之間或取寸口至尺澤分陽分陰藏與府之配而察虛實死生者非不纖悉也而今試按其所謂三部者三指之所應未嘗不一動也則其雖寸口至尺澤亦無不皆然焉然則其特為在寸口者不必以三指雖二指或一指亦何不可之有不特於寸口趺陽少陰亦惟隨切隨察何必三指取三部之為至如叔和氏之輩立七表八里九道合為二十有四則不為不相似亦終不可施於事則何從如此之煩為夫脈證者疾病之轉機而相依不離者也故脈必須證證必須脈然後疾病莫攸隱匿焉古者稱醫為脈家如扁鵲倉公輩亦皆以脈其選也仲景氏之於方論亦復舉脈證以為處方之準據則又何廢脈之為熱五道十二名三陽之所主在於熱焉熱之所名而喚者凡十有二而其大綱凡五焉大綱凡五而其所統不出於表裡矣一曰惡寒發熱二曰往來寒熱三曰身熱四曰惡熱五曰潮熱此五者熱之大綱也不可不辨矣有表熱有外熱有微熱是皆屬身熱也有裡熱有煩熱有瘀熱有蒸蒸發熱是皆屬惡熱也此七者熱之小目也亦不可不辨矣雖然或屬身熱或屬惡熱則大綱不過於五焉然後惡寒發熱往來寒熱此二者為表以其有惡寒也身熱惡熱潮熱此三者為里以其無惡寒也然則雖其凡之綱於五焉而其所統不出於表裡矣蓋惡寒發熱者惡寒且發熱也而其熱全在於大表翕翕者也是為太陽往來寒熱者熱之與寒互往而互來也而其熱在於胸脅之間使人心煩喜嘔者也是為少陽身熱者胸腹之常熱也而其熱在於肌膚使人身重微煩者也惡熱者惡如惡寒噁心之惡而其熱全在於分肉鬱郁如蒸炎炎如焮能使人常煩者也潮熱者其發之必有時也猶如潮汐之以時來去也而其熱專結於裡時又熏於肉亦能使人煩躁者也此三者為陽明陽明者三陽之極也故其熱之及也或膚或肉或里惟其極為然矣三陰之主寒也尚有表熱外熱發熱微熱等雖然其脈之與證固與三陽不同也而三陰之於脈證沉微細而手足寒甚則無脈而四支厥逆故雖有表熱外熱發熱微熱等非如三陽之脈浮一身手足盡溫也是之為其別亦不可不辨矣又有曰熱入血室者此亦為一種之目也而或屬往來寒熱或屬潮熱又有曰無大熱者此非若上所舉之五之數也大即大表之大非大小之大故無大熱者謂無表證也即指太陽之發熱惡寒而言之矣又如曰熱結曰結熱曰熱實曰協熱曰合熱曰熱越曰熱利之類亦皆非如上所舉之五之數也辨詳於各條之下先於此或請問熱之辨余答以五綱十二名或曰五綱十二名既聞其教矣然於其情狀猶有未盡者願書以再教我我幸以此辨之吾子其勿辭哉余不得止書以與之乃今搜得其稿於巾衍此雖與前之所辨或重復乎直附於此以便於初學云惡寒發熱惡寒之中且發熱發熱之中且惡寒也一日二三度發發熱之中且惡寒熱多而寒少其發作也日至二三度而與往來寒熱頗異故論曰如瘧狀此以其二三度發作言之也又曰其人不嘔此以其異於往來寒熱言之也日再發同上而稍輕矣故不至二三而再再也者不過一二之辭二三也者逾再次之辭也二三之所以為重也時發熱此惟時時發熱已與潮熱之期時而發大異矣蓋發熱者在大表而翕翕者也潮熱者在分肉而蒸蒸者也大表淺矣故未至煩躁也分肉深矣故使人煩躁也此豈非大異乎往來寒熱寒止即熱熱止即寒互而發者也而其自熱而之寒也非無間也惟是為間而復繼發之如初所以名曰往來也發作有時此其寒與熱之休作必以時者也或以午後發至未申之間而休或以未申之間發至酉戌之間而休或暮時而發夜半而休或夜半而發至天明而休凡若此類皆以名焉此與潮熱相似而頗異潮熱之必以時也既結於裡而蒸蒸於分肉故無有寒而發為惡熱煩躁也若乃發作有時也猶專於胸脅而翕翕於肌表故寒熱互發未至煩躁也此之為其分矣潮熱熱之發也必有時矣猶潮汐之來去以時也所以名曰潮也且其於常也必身熱當其發也必惡熱所以使人煩躁也不但於日晡所或於午未申之間亦可以名之矣若必於日晡所而名矣則惟曰潮熱足矣復何煩日晡所字乎其實則有於日晡所者有於午未申之間者又有日晡所發熱者惟是潮熱之蒸蒸於分肉此為正陽明也惟是發熱之翕翕於肌表此為屬陽明也雖均之於日晡所乎或肌表或分肉淺深之分不可無辨矣所以更冠日晡所字以辨潮熱發熱之分也惡寒三道惡寒之於別凡三道焉有發於陽者有發於陰者有因精氣虛者此三道者為惡寒之別也而其發於陽者必脈浮而有熱是即桂枝麻黃之所之也例曰有發熱惡寒者發於陽也其發於陰者必脈沉而無熱是即附子之所之也例曰無熱惡寒者發於陰也其因精氣虛者必在於表裡已解之後也例曰脈微而惡寒者此陰陽俱虛又曰發汗後惡寒者虛故也此既非病之所使也固無有藥之可以治矣故例曰不可更發汗更下更吐也然則何以乎惟飲食之養而已古語曰養精以穀肉果菜此即其法也夫藥也者制變焉者也故病已愈之後猶且因循服藥而不罷者固非法也況乎無故而常服藥乎惡風惡寒亦惟輕重之別已雖然考仲景氏之所論傷寒言惡風中風言惡寒互而不拘也然試辨其輕重才風於身則忽灑淅毛穴聳起不風則否是為惡風也不在其風於身之與否寒既自內而發不但毛聳雖襲衣被之數枚乎嗇嗇如身將縮狀是為惡寒也此其輕重之辨也雖然觀乎仲景氏既互言而不拘則欲以此而強辨傷寒中風者太拘且泥矣惡寒之於陰陽其治法分為二十有四焉其發於陽者凡十有七論曰太陽中風陽浮而陰弱嗇嗇惡寒淅淅惡風鼻鳴乾嘔者曰太陽病頭痛發熱汗出惡風者皆桂枝湯主之曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之曰太陽病項背強𠘧𠘧無汗惡風者葛根湯主之曰太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之曰太陽病脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可日二三度發宜桂枝麻黃各半湯曰若形如瘧日再發宜桂枝二麻黃一湯曰太陽病發熱惡寒熱多寒少宜桂枝二越婢一湯曰傷寒中風五六日往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔曰傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者皆小柴胡湯主之曰傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之曰傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯曰傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭出汗往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之曰傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者曰傷寒無大熱口燥渴心煩背微惡寒者皆白虎加人參湯主之此其發於陽者而其治法或專於表或制之於中位者也其遂之於陰位者凡二論曰太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之曰太陽病下之後脈促胸滿微惡寒者桂枝去芍藥加附子湯主之此其遂之於陰位者而其治法猶主陽而及陰者也其陰陽相錯者一論曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之此其陰陽相錯者而其治法陰陽並治者也其發於陰者凡五論曰心下痞而復惡寒汗出者附子瀉心湯主之曰少陰病一二日口中和其背惡寒者附子湯主之曰大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者曰吐利汗出發熱惡寒四肢拘急手足厥冷者皆四逆湯主之曰惡寒脈微而復利利止亡血也四逆加人參湯主之此其發於陰者而其治法皆專於陰者也惡寒之於陰陽其治法之分若此不可不審矣夫三陽之自外也其所主在於熱而其所候專在於惡寒故以惡寒為外候之標準也是故於太陽之篇首姑措發熱而獨舉惡寒以示其為標準也惡寒既為外候之標準也莫論其為太陽於少陽則為往來於陽明則獨無有矣少陽之為往來也以其在胸脅也陽明之獨無有也以其入於胃也若其有之也猶取之於表必先發其汗惟俟惡寒止為專於陽明之候而後攻其里此為法也故例曰若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯又曰陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯又曰陽明病脈浮無汗而喘者發汗則愈宜麻黃湯又大陷胸湯曰脈浮而動數頭痛發熱微盜汗出而反惡寒者表未解也大黃黃連瀉心湯曰心下痞惡寒者表未解也不可攻痞當先解表十棗湯曰汗出不惡寒者此表解里未和也此惡寒果為外候之標準也所以於太陽之篇首姑措發熱而獨舉惡寒也是故凡曰表證曰外證曰表不解曰外已解者皆指太陽之發熱惡寒言之也於脈則必浮故例曰脈浮者病在表可發汗又曰脈浮數者可發汗又曰脈浮數者法當汗出而愈又曰脈浮宜以汗解脈之於例亦惟為然矣三陰之自內也其所主在於寒而其所候之法在於析其有熱否以發熱為外候之標準也是故論曰少陰病始得之反發熱脈沉又曰以二三日無里證故微發汗也發熱之果為外候之標準也其論其為少陰姑以發熱取之於表曰無里證以明其以發熱為外候之標準也於是微發其汗此為法也又曰太陰病脈浮者可發汗亦取之於表者也由是觀之發熱果為外候之標準也惟厥陰則寒之極也熱之極也故雖或發熱惡寒乎頗異於太陽也何以見其異乎太陽則脈浮手足自溫厥陰而脈微欲絶四支厥逆所以為異也惡寒之於別或發於陽或發於陰或因精氣虛而治法各以其類分惡寒之別豈可不審矣哉頭痛頭眩各二道頭痛頭眩亦皆有陰陽之別而頭痛則專於太陽而厥陰與焉頭眩則專於少陽而少陰與焉何謂頭痛則專於太陽而厥陰與焉例曰太陽之為病脈浮頭項強痛而惡寒論曰太陽病頭痛發熱汗出惡風者桂枝湯主之曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此豈非專於太陽乎論曰病發熱頭痛脈反沉若不差身體疼痛當救其里宜四逆湯曰乾嘔吐涎沫頭痛者吳茱萸湯主之此豈非厥陰與焉乎頭痛之於陰陽也若此矣陰陽也者惟是寒熱之別也何謂頭眩則專於少陽而少陰與焉例曰少陽之為病口苦咽乾目眩也論曰傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊茯苓桂枝白朮甘草湯主之此豈非專於少陽乎論曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之例曰少陰病下利止而頭眩時時自冒者死此豈非少陰與焉乎頭眩之於陰陽也若此矣陰陽也者亦惟寒熱之別也又霍亂之於頭痛也論曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之此發於陽也又曰寒多不用水者理中丸主之此發於陰也霍亂之有陰陽亦不出乎寒熱之外也頭痛之專於太陽也又有延及於陽明少陽者論曰傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也若頭痛者必衄宜桂枝湯此其於不大便雖既為陽明而其於頭痛猶未離太陽於是又因其小便之清濁而益審其病位者也故不標其病位而曰傷寒此豈非頭痛之延及於陽明乎論又曰傷寒脈弦細頭痛發熱者屬少陽此其於脈弦細雖既為少陽而其於頭痛發熱猶未離太陽者也故亦不標其病位而曰傷寒曰屬此豈非頭痛之延及於少陽乎論又曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之此其於病位當為少陽此而若惡寒則宜先與小柴胡湯而已論又曰太陽病脈浮而動數頭痛發熱微盜汗出而惡寒者表未解也此其於病位亦當為少陽此二者皆雖標以太陽而其於頭痛亦惟延及於少陽者也嘔吐各二道附噦嘔吐之有陰陽也亦惟熱之與寒凡各二道焉而治法則三十有六也熱之為嘔吐也以其或及於胃或逼於胃或素心下有水氣為彼所激也此為自外使之也故取之於陽寒之為嘔吐也亦以其或及於胃或逼於胃或素心下有水氣為彼所激也此為自內使之也故取之於陰惟熱則脈必浮若或不浮固不得為沉惟寒則脈必沉縱至微細固不能為浮一寒一熱是為陰陽之別凡之所以各為二道也若夫二者之為嘔吐也固有輕重焉於是或嘔或吐或欲嘔或欲吐或嘔逆或吐逆或嘔吐或欲嘔吐或乾嘔差其所名以分其輕重名分不可不辨矣蓋嘔者有欲吐之意而作聲也吐者有物即出也欲嘔者胸中憒憒殆將作聲者也欲吐者有物將出而未出者也嘔逆吐逆者欲嘔欲吐而其氣衝於上者也嘔吐者有聲而物出也欲嘔吐者聲物將兼出者也乾嘔者無物而徒作聲也此為其名分矣名分彰而輕重可較輕重較而處方惟的名分豈可不辨乎嘔吐之於證也又有主客焉專乎此而兼乎彼是為之主也專乎彼而兼乎此是為之客也惟是在其勢而已故勢在於此則必於此勢在於彼則必於彼此其於處方隨其勢而制之者也主客何外乎輕重輕重何離乎寒熱寒熱也者陰陽之謂也故凡察證之務始於寒熱中於輕重終於主客轉機之本也處方之要也不可不審焉亦不可不慎焉嘔吐之於陰陽也治法則三十有六者何謂也其在陽位而嘔者凡九焉論曰太陽與陽明合病不下利但嘔者葛根加半夏湯主之曰傷寒中風五六日往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔者小柴胡湯主之曰傷寒五六日嘔而發熱者柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解曰陽明病脅下鞕滿不大便而嘔舌上白胎者可與小柴胡湯曰嘔不止鬱郁微煩者與大柴胡湯下之則愈曰傷寒十三日不解胸脅滿而嘔日晡所發潮熱潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之曰傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之曰太陽與少陽合病自下利若嘔者黃芩加半夏生薑湯主之曰發汗吐下後虛煩不得眠若嘔者梔子生薑豉湯主之其在陰位而嘔者凡五焉論曰少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或不下利或嘔者真武湯主之曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之曰少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之按溫其上蓋與四逆湯以溫之也曰令病者靜而復時煩須臾止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之曰嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之此嘔之別於二道而治法之以寒熱異者也其在陽位而吐者凡二焉論曰中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆曰霍亂頭痛發熱熱多欲飲水者皆五苓散主之其在陰位而吐者凡五焉論曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之曰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之按此蓋瓜蒂散之所之也曰傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐者乾薑黃連黃芩人參湯主之曰吐利汗出發熱惡寒四肢拘急手足厥泠者四逆湯主之曰霍亂寒多不用水者理中丸主之此吐之別於二道而治法之以寒熱異者也其在陽位而欲嘔欲吐者各一焉論曰食谷欲嘔者屬陽明也吳茱萸湯主之曰太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯此欲嘔欲吐者之偏於陽位而治法各亦以其輕重異者也其在陽位而嘔吐欲嘔吐者各一焉論曰傷寒汗出不解心下痞鞕嘔吐而下利者大柴胡湯主之曰傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之此嘔吐及欲嘔吐者之偏於陽位而治法各亦以其輕重異者也其在陽位而嘔逆者凡二焉論曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈浮緊者此雖為名傷寒之例於法必是麻黃湯之所之也曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之其之陰位而吐逆者一焉論曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之此嘔逆吐逆之別於二道而嘔逆之暴急在陽吐逆之深劇在陰是陰陽之分也而其於治法亦以寒熱異者也其在陽位而乾嘔者凡四焉論曰太陽中風陽浮而陰弱嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之曰傷寒表不解心下有水氣乾嘔發熱而咳者小青龍湯主之曰傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安者甘草瀉心湯主之曰本太陽病不解轉入少陽脅下鞕滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯其在陰位而乾嘔者凡四焉論曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人或乾嘔者通脈四逆湯主之曰若膈上有寒飲乾嘔者急溫之宜四逆湯曰乾嘔吐涎沫頭痛者吳茱萸湯主之曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之此乾嘔之別於二道而治法亦以寒熱異者也嘔吐之於陰陽也輕重之差主客之勢治法之分為三十有六者如此轉機之本也處方之要也察證之務豈可不審焉哉亦豈可不慎焉哉噦者噦逆也後之所謂厄逆也解為乾嘔者非也論中有噦有乾嘔噦果乾嘔當但曰噦何更曰乾嘔也噦乾嘔自異其證義亦自不同豈可混乎然其嘔噦並言即乾嘔之義字書云有聲無物曰噦因解為乾嘔耳蓋噦逆者氣逆上衝吃吃作聲也素問曰胃為氣逆為噦仲景氏以胃中虛冷言之也論曰食谷者噦曰與水則噦曰飲水則噦曰下之早則噦曰攻其熱必噦曰時時噦曰加噦者不治曰噦而腹滿之類此皆後之所謂厄逆而非乾嘔也故噦者噦逆也然不載其治法矣又以咳逆為厄逆者是後世之所創而非其正名也曰噦曰厄曰咳一證而二三其名則來者之不眩惑者幾希矣咳喘各二道咳喘之岐以陰陽也凡各二道焉亦必以熱以寒猶嘔吐耳此二者之為咳為喘者或自外或自內雖均為咳為喘乎寒熱之分不可不辨矣咳之為證雖云有陰有陽而輕重隨之亦唯可以為一證耳唯喘也有所異喘之為證獨多乎熱而少乎寒也熱之聚會乎為喘寒之奔騰乎為喘熱之極也寒之極也惟其於極寒之為甚故寒之於喘為極之極也危殆之至也既是為極之極所以獨多乎熱而少乎寒也於熱乎猶可救於寒乎不可救也是故三陽有治法而三陰無治法也喘之為證不可不畏矣咳之於陰陽也治法凡五焉而其於陽也凡二焉論曰傷寒表不解心下有水氣乾嘔發熱而咳者小青龍湯主之曰傷寒中風五六日往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或咳者小柴胡湯主之其於陰也凡三焉論曰少陰病腹痛小便不利四肢沉重疼痛自下利或咳者真武湯主之曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之此五者皆咳之治法而陰陽之別也不可不審矣喘之於陰陽也熱可救而寒不可救故治法之關於此者惟在陽位凡十有二焉論曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之曰太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之曰傷寒心下有水氣咳而微喘發熱不渴者小青龍湯主之曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之曰太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之曰發汗後不可更行桂枝湯汗出而喘無大熱者麻黃杏仁甘草石膏湯主之曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出而不惡寒反惡熱身重若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之曰陽明病脈浮無汗而喘者發汗則愈宜麻黃湯曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也曰傷寒四五日脈沉而喘滿汗出讝語者以有燥屎在胃中也須下之曰病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也皆宜大承氣湯此十有二者皆關於喘之治法而惟在陽位者也喘之為證熱之極也寒之極也而在太陽則熱之所延及猶專於表而未及於極也故發汗以治之也至陽明則熱之所聚會已專於裡而殊極於此故下之以救之也既下之尚恐其不及不及則斃故例曰劇者發則不識人循衣模床惕而不安微喘直視脈眩者生澀者死又曰直視讝語喘滿者死惟熱之極為然豈可不畏乎至厥陰則寒之所奔騰已甚於內而最極於此所以為極之極也危殆莫甚焉其能可救乎故例曰下利手足厥冷無脈者灸之不溫若脈不還反微喘者死惟寒之極為然豈亦可不畏乎如喘家則不在此數也論曰喘家作桂枝湯加厚朴杏子佳此惟在一時之處而非通治喘之謂也言其人若當其有表證也處之以此為佳耳故如喘家則不在此數也
