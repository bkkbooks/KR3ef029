body:
  text: 卷一題名辨醫藥之道蓋昉於農黃氏云素靈二書雖名於黃岐氏乎非實有其問而實為之對者也惟於行文之間假以為之體裁猶後人設於或問以明義於答也不知其出於何人之手耶醫之稱農黃氏也亦猶道家之稱黃老惟神其所由耳素靈固非黃岐氏之所撰也農黃氏邈矣尚書之肇於唐虞也學者必考信於此則素靈之果成於黃岐氏耶先於尚書年世其幾何雖道之不同而文辭之不相肖其何太遠也說者以為先秦之僞撰或以為六朝之辭氣此皆似有所見者也乃今審其文脈固不能升於六朝之上然猶可考於今者雜存乎其間則非可全廢也蓋當其撰之之始也幸有古語之傳者且補綴且敷演首之尾之羽之毛之以成其篇而已故今將欲讀其書以考信於此豈可不善擇哉夫醫者事之為也為之存於人存於人之故必俟其人苟非其人道不虛行往昔之於事之為也不傳之書而傳於言是以史之所載雖有和緩俞胕文摯扁倉之輩徒稱其名又何有其事之為之可考其書於今哉如八十一難傳云扁鵲之所述雖然史記無作難經之言或云吳呂廣之所僞撰然則其非正書審矣又何可考之於今哉當秦之時雖坑儒焚書乎醫幸免其厄則其書不可不全傳也而今素靈及八十一難之書既已如此則醫之於古傳之於書者固希醫之於古果不傳之書而傳於言也然則其適傳之於書亦必其禁方而非其道之盡於此者也何以睹其術之所為者故非俟其人而口授面命則必有所不盡焉如長桑君之於秦越人豈不然耶當西漢之時儒術承焚坑之餘而惟醫循其舊爾然則其書之不可傳者儒也而及全於儒其書之可傳者醫也而不全於醫何耶此其始所有也故雖已焚乎匿於彼藏於此猶得其全其始所無也故難免厄乎本無可匿又無可藏何以得其全豈非其傳於書者固希哉及東漢之時有張氏仲景者身為長沙太守好修方技稽往昔之方法集大成以建之規則號曰傷寒論傷寒論者方術之傳於書之創也方術之傳於書者獨創於張仲景氏而其可考於今者惟是而已故傷寒論者萬世之規則也是以竊比之於作者稱長沙醫聖以為方法之祖也又有金匱要略及玉函經私疑其云金匱云玉函者本是傷寒論之美稱而非有此二書也既比其人於聖則亦不得不比其書於金玉也仲景氏之所傳惟是傷寒論而已傷寒之於論莫適非變愈適而愈變是以遂及於雜脈證也後人不辨此之旨謂必當別有論雜病之書然奈其無有何因幸有金匱及玉函之稱剽竊其及於雜病者於論中繼之以附會此其書之所以僞撰也且王燾氏之纂外臺祕要方引金匱要略之所載皆以為傷寒論則此時猶未有要略其果成於唐以降者益足以證矣因此而觀之仲景氏之所傳惟是傷寒論而已雖然年逝世更傷寒論亦既非仲景氏之書乃今之所傳出於晉太醫令王氏叔和當是之時簡冊之散軼也憂其遂亡滅輯集以流之於世叔和氏之撰次斯論也雖固無意於攙入其言以紊其真而未始上之於梨棗而公行於天下則其後之殘缺錯亂固已太多而旁發其所窺之意者展轉謬寫而混淆正文以致後人之迷盳亦已不少夫仲景氏之所載而傳者往昔之方術也乃其於脈證有名有數與其行文之法固不與後之方書同其撰也藉使叔和氏溷之以其似者玉石本自有分又何患其磊砢乎於是觸類推例邀之於交互而臨於左右拆句頒章為之段落則知脈證之具於名數與其行文之法果不可同後之方書視之也然後流耀而含英乃珠乃玉如視諸掌上焉又何眩曜瓦礫乎夫脈證者方之所之也而術之於變化未嘗不循其轉機焉仲景氏之所以規則於萬世也脈證之於轉機不可素度也惟仲景氏能度而察之察入神焉處方之於變化不可素定也惟仲景氏能定而應之應致妙焉神之與妙體之於我而後仲景氏之術可得而臨於今矣故欲修仲景氏之術者此之不可不務焉欲務於此者不可不由於規則焉仲景氏之建規則也統邪以寒矣歧為五名而有內外焉有輕重焉陰陽以辨內外風寒以析輕重陰陽各三而其相交者為合其及者為並系之於三陽盡其變態百出焉是為三陽三陰也陽曰浮陰曰沉風曰緩寒曰緊或數或遲或滑或澀以候內外以診輕重是為脈之分也熱五綱而十二名惡風寒為三道頭痛頭眩嘔吐喘咳疼痛腹痛腹滿瘀血及汗之與厥則各二道而消渴之與煩躁則各四道燥屎宿食之一而為八下利之二而為六精而曰虛邪而曰實實為讝語虛為鄭聲有正焉有屬焉是為證之別也或先脈而後證或先證而後脈脈或兼證證或兼脈插以例之辭於前於後挈因命證方證互略枉而還之隔而接之是為行文之法也夫邪之雖一乎殊內外異輕重為三為六自百而千千轉萬移莫有窮極始於傷寒而終於雜脈證脈證之具於名數與其行文之法莫不該備而盡焉此仲景氏之所建而萬世之規則也自非其入神致妙烏能至於此哉不可不由以審焉往昔之方術儼然可臨於今者若此藉使叔和氏溷似者於其間又何所眩矅失其真者乎若徒說脈而遺證論證而闕方且追且搜不中繩墨者此不直叔和氏之為也出於其末流之手亦未可量也余於是乎擇以斥之乃余之所類而例也所擇以斥也名數之與夫行文之法舉以辨之推以正之所以有辨正之著也辨正之於著明於名數為先務所以有名數之解也此二者皆所自玩也何必示之於人若其示之必罪余為拘縛章句爾雖然二千歲之下人與骨皆已朽昕恃者章句不恃章句將何所折衷乎縱令我獲拘縛之罪固所不辭也或者同僻之士有一取乎我其愈快亦所不期矣傷寒也者為邪所傷害也謂邪而為寒蓋古義也故寒也者邪之名也而邪之傷害人最多端矣雖其多端矣約之則不出於三陽三陰焉三陽淺深之狀也三陰緩急之態也約此六者則不出於陰陽焉陰陽內外之分也約此二者則不出於風寒焉風寒輕重之別也統此二者則不出於一寒焉寒也者邪之名也而邪之傷害人雖多端矣約之於三陽三陰以統於一寒也如此夫惟統之也一寒而已題之所以命曰傷寒也而其所以命曰論者蓋論也者論定之義與論語之論略同而非議論之論也預舉事形稽諸古訓而斷之方法以供他日之用此之謂論定也乃今傷寒之於方論預設病狀而具之處方義亦相似矣題之所以命曰傷寒論也自序辨古之人既能修之於我而究其極致則著書以述其意也未必顯於當世而期之於身後也後之人頗有其所窺乎或發其指歸於卷端題以為序所以題以為序者蓋擬詩書之題序也是故在秦漢以上雖有諸子百家而未嘗聞自序其書也莊周之於天下其為之似乎未嘗言序也司馬遷之於史記自為之序則不啻似之已雖然其次之於卷後而謂之傳者自有其旨豈類於後之題序乎哉至乎挽近急於希售是其自序之所以昉耶而今仲景氏之自序於卷首者何耶竊尋其文意脈理不屬且其言曰撰用素問九卷八十一難陰陽大論胎臚藥録並平脈證辨為傷寒雜病論乃今質諸終篇未嘗有本於此者或似於此固無足信者矣至他如五藏府俞經絡陰陽及人迎趺陽三部九候明堂闕庭等之言亦皆不與本論相愜也而其不出於仲景氏之手矣是必後之黠者不推仲景氏之本旨僞擬以欺人者耳且夫素難之果成於東漢以降乎豈可復與仲景氏之言相愜乎哉脈法及平脈法辨辨脈之法及其平脈之法蓋出於王叔和氏也王叔和氏之於脈診蓋獲之於天性耶乃其所著之脈經若干篇獨極其精微焉而凡二十有四分為七表八里九道也配之以三焦五藏六府三其部位九其診候以視病應以推生克權虛實察死生纖細密悉莫所不臻矣此自非獲於其天性烏能至於此乎哉獨得之道非所以覺之於他人也張仲景氏之於脈法則獨不然曰在陽則脈浮在陰則脈沉大抵浮沉以統之緩緊遲數滑澀相差以系之故浮沉陰陽之位而陰陽疾病之位也而緩緊遲數滑澀悉繫於浮沉於是乎或陽或陰先定其位而後輕重緩急之機觀於其所屬則可以考矣不特此而已須與證相愜不苟誣於我此之為善考而善盡矣惟仲景氏之脈法為爾仲景氏未嘗分七表八里九道也未嘗配三焦五藏六府也未嘗及三部九候也本論之中其或儳及三部陰陽乎即斁火於仲景氏之本旨也辨詳於脈候篇夫仲景氏之脈法之概若此又烏可以叔和氏之脈診混之乎哉叔和氏之獨極精微於此也私淑於張仲景氏也竊尋其心曲本當無意乎混之於此使人眩惑也惟以其天性之獲於脈診或至於本論得意之處旁發其脈法將以試己之技耶烏知後人之不謬寫而遂傳於今乎夫然故欲讀仲景氏之書而修其術於我者不可不擇焉擇之有差不於理而必於事事存乎辭而辭之愜事事之愜人可取以臨矣是之謂善擇也若其於理也不徒不得乎辭既不愜事又奚愜人矣是之謂不善擇也今夫如辨脈平脈二法則不得不與本論相乖也且如其大浮數動滑為陽沉澀弱弦微為陰似則似矣雖然陰陽本是表裡之統名也沉浮陰陽之位而緩緊遲數滑澀悉系焉則其以大動為陽之位以澀微為陰之位猶可數滑之不可一為陽也弱弦之不可一為陰也其謂之何矣夫數滑弱弦相與系之於陰陽以差之者也而今一之於陽一之於陰者此蓋一種之陰陽而非仲景氏所取於表裡之統名者也如本論曰陽浮而陰弱曰陰陽俱緊曰陽脈澀陰脈弦皆謂疾病之位而不謂其所候之處則又與彼背馳矣同是一陰陽也於彼如彼在此如此何其無定準也而後之言脈之陰陽者或以尺寸或以浮沉乃其所謂浮沉者不以其人而以己之指也以指之故加之以中嗚呼是何其言之謬乎浮沉本是陰陽之位而自存乎其人豈可求之於己之指乎其所謂尺寸亦惟一脈一動而無有異也脈之於動本是一身之活機而其所由起在於臍中所謂腎間之動是也而謂起於臍下非矣上自頭頂而下抵於四末莫所往不到焉莫所遠不逮焉此乃人之所以生也夫一身之活機既起於臍中頭頂而四末莫所不到而逮則其於動也雖欲不一焉得乎況於尺寸之脈路出於同一乎惟少陰與趺陽之來應低昂少異爾此其以脈路之所纏繞而來之別也亦惟自存乎其人豈可復求之於己之指乎尺寸亦惟一脈一動而無有異也藉令據尺寸及浮中沉等之說則如陽浮陰弱陰陽俱緊為尺寸可為浮沉亦可而其名於表裡終不可見也如陽脈陰脈惟尺寸可言而浮沉不可二表裡不可見也何則陰陽本名於脈焉者也名於脈焉者即名於疾病焉也非名於指焉者也若乃脈之於浮沉自存乎其人則指之切之也不敢不從之也惟脈不為指之浮沉指能浮沉於脈乎因是觀之陰陽之為說或尺寸或浮沉紛紛乎不知所適從矣然則陰陽之義將何之取乎夫陰陽表裡之統名也寒熱陰陽之分也浮沉陰陽之位也風寒輕重之別也緩緊風寒之析也是故表為陽里為陰陽曰熱陰曰寒浮則陽沉則陰風寒系焉緩緊屬焉於是乎緩緊之為風寒風寒之為輕重或浮或沉熱乎寒乎惟陰陽為統之矣故曰陰陽表裡之統名也夫既浮沉之為陰陽之位也所謂陰陽俱緊者獨似可言也陰陽之果不在於指而在於脈也系浮沉於緊則其陽其陰足以辨其位矣乃言陰陽而浮沉自在其中也且緊之為脈浮沉相差以系之也故曰陰陽俱緊此獨似舉其概而例之者也是之為陰陽之辨矣叔和氏之於脈診雖獨極其精微之若彼乎於仲景氏之脈法其不相依也若此矣此固其所建之不同也以不同而欲同之也豈其不乖乎故欲讀仲景氏之書而修其術於我者不可不善擇焉已而善擇焉則仲景氏之脈法彰然如指諸掌也又何從叔和氏之脈診矣乎哉叔和氏之獲之於天性而能至於此也吾之固所不能也雖吾之已所不能乎人又或能之也至其能之也豈讓乎叔和氏乎若乃辨脈平脈二法則脈經之餘論而叔和氏之金科玉條也又何取乎仲景氏乎仲景氏之脈法既具於本論當就而審焉爾且叔和氏果無意乎混之於此使人眩惑也雖余之所取捨之若之也亦豈多恨矣乎哉傷寒例辨傷寒之例蓋亦出於王叔和氏也其所據而例肇於陰陽大論旁及素問八十一難加之以其所窺此獨契於題序所謂撰用者耶如其所謂傷寒溫暑及時行疫毒冬溫等之別非不纖悉如大左於仲景氏之所論何又獨以傷寒為觸冒冬時嚴寒之病則如春夏之病何於是乎至有春溫夏熱之說也又云四時之氣皆能為病也非其時而有其氣以病人者名為時行疫毒此豈謂盡無之乎雖然按鬥歷占之之法吾是之未能信矣乃索之於本論未有愜於此者蓋張仲景氏之所論風寒皆邪之假名而輕重之別已寒之所以為重者以其最成殺厲之氣也風之所以為輕者以其不若寒之太甚也故風寒皆假以名於邪者也夫既有風寒之名而未見其形於是乎假陰陽以形其內外內外既形而未得其狀於是乎分其陰陽各以為三以狀其大體大體既狀而猶未委曲於是乎三陽三陰各委曲其脈證千狀萬形莫所不至焉然後內外輕重之脈證委曲於此則何更問四時而後處之是故不但觸冒冬時嚴寒之病雖溫暑及時行疫毒冬溫求之於脈證則莫不悉具於其中焉洽彌於四時因是而觀之方仲景氏之時未有春溫夏熱及時行疫毒冬溫等之別也推之於六氣而命之名以別之者蓋亦創於叔和氏也人之生於天地之間誰不受其氣則推之以六氣者不為無其理也雖然病之與人俱活不可推之以理者固衆縱得之於理惟在其變態而不二乎邪自外自內何離乎陰陽或輕或重何出乎風寒亦各有其脈證具則雖變態之千萬乎必求之於脈證隨以處之其又何乖也仲景氏之於術不問四時而取於一邪千萬其脈證而極其變態能極其變態之故又遂之於雜脈證奚獨傷寒也夫如此也則春溫夏熱及時行疫毒冬溫等之別固不足據矣況於按鬥歷占之之法哉且夫仲景氏之所論而博也內外輕重之脈證千狀萬形往乎來乎靡往非例焉靡來非例焉既而委曲於此也又復曷須傷寒之例且其例中顯言搜採仲景舊論且千金外臺諸書亦多引之為叔和之語得傷寒之例之出於叔和氏也益足以證矣然則此固叔和氏之例而非仲景氏之例也何以與本論相愜矣傷寒之例亦豈足據哉亦豈足據哉痙濕暍辨痙濕暍之於脈證也曰傷寒所致復曰與傷寒相似抑此何言哉既曰太陽痙濕暍太陽病之外豈復有所謂痙濕暍者耶若必為傷寒之所致則其為相似者果非耶若必為相似者之果是耶奚翅痙濕暍奈霍亂及瘧等之相似何此獨何以遺於此耶傷寒所致太陽六字果不可讀矣彰彰乎明哉出於後人之為也夫仲景氏之統脈證也惟是陰陽而已已而千狀萬態莫所不盡焉是以不外於奔豚結胸火逆水逆發黃蛔厥等豈惟痙濕暍之別論哉有金匱要略者分部設門以論雜脈證而痙濕暍為始此蓋後人謬讀傷寒之論謂惟論觸冒冬時嚴寒之卒病則必有論雜病之書於是搜取其散落者一二於諸家未足以成篇因又剽竊論中及雜脈證者僞撰以為金匱要略耳何以明金匱要略之為僞撰也痙濕暍皆冠以太陽病三字此當其剽竊之時猶循其舊忘削去三字而獨削去其論中之原文太陽下篇風濕二條亦剽竊之而忘削去其原文幸足以辨其本旨矣因此而觀之痙濕暍本自在於太陽篇者彰彰乎明哉且傷寒論有中風金匱要略亦有中風名同而病異此以一而兼二耶太陽有奔豚少陰有下利為詳且盡而亦覆載焉此右取而左忘耶取唐以降之方附之各門之後此前知身後數百年耶藉令仲景氏之聖亦豈若此其明乎其他復出之與其容疑焉者不可指數矣誰謂金匱要略之非僞撰耶其曰傷寒所致復曰與傷寒相似別而論之者非仲景氏之本旨豈不彰明哉雖然觀乎傷寒論有小建中湯無大建中湯大小半夏湯及越婢湯等之特具於金匱要略則仲景氏之遺方不為不存於此金匱要略之不可全廢也要不過十之二三宜淘汰以輔其術而已矣乃今辨正傷寒論措痙濕暍而自太陽篇始者所以復仲景氏之舊也處方之悉具於金匱要略則不如就彼而求之之便故不辨於此矣汗吐下辨如篇末載可發汗不可發汗可吐不可吐可下不可下汗吐下後等之辨豈其不可乎雖然其可與不可既載於本篇而無所不盡焉而今又復辨之於篇末者豈非為蛇添足乎截長綴短補之以其家說者豈亦出乎王叔和氏之工巧耶大類乎辨脈平脈二法及傷寒例者也夫既本篇之所載可取以例則又何加焉惟至如其於可下之辨載大承氣湯及大柴胡湯之證六七條則本篇之所闕此可以補之然則惟此之辨不可廢也而亦載之於金匱要略此豈本篇之既闕而存之於此耶將金匱要略之所載取之於此耶又將獨存乎金匱要略者假之於此耶要之金匱要略之雖不可信而比之於此辨可下者抑猶古也其不可全廢也姑讓之於彼固亦無不可矣然則惟此之辨不可廢也亦廢之可矣其他可發汗不可發汗可吐不可吐可下不可下汗吐下後等之辨雖似無不可固已遠於古也又何足據乎又何足據乎
