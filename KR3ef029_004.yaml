body:
  text: 卷四日數凡疾疢之於淺深緩急也莫不脈證之盡焉然又因日之多少或為之轉機則日數何不舉也所以系之以日數也雖則系之以日數乎亦惟概舉以為法焉爾乃其不曰一日二日三日而曰一二日二三日者豈非概舉乎夫既雖概舉曰一二日二三日乎因日之多少或為之轉機則何可視以忽諸哉於是乎知其曰一二日二三日者以其初發之位與發汗之過不及言之也如其曰四五日五六日六七日則以其既轉者言之也然又不無至此而猶不轉至八九日或十日以上者論曰太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗又曰病過十日脈但浮無餘證者皆宜麻黃湯此皆既至八九日十日以上猶不轉者也當是時也猶行發汗之方此為法也又曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少一日二三度發宜桂枝麻黃各半湯若輕於前證一等而日再發宜桂枝二麻黃一湯若又不及其再三宜桂枝二越婢一湯此亦皆既至八九日猶不轉者也故曰其人不嘔清便欲自可當是時也亦猶行發汗之方此為法也若其既轉也在五六日或為往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔宜小柴胡湯既與小柴胡湯嘔不止心下急鬱郁微煩宜大柴胡湯若前證已愈但渴宜白虎湯而其小便不利宜豬苓湯若微發熱宜五苓散此亦為法也其在六七日或為身熱為惡熱為潮熱多汗口燥舌乾而渴欲大飲水宜白虎加人參湯若其脈滑疾讝語煩躁小便濁而數不大便或難或鞕於是先與小承氣湯審其燥屎之候然後與大承氣湯假令與大承氣湯明日不大便脈反微澀不可更與之此亦為法也是皆其既轉者也論又曰少陰病始得之反發熱脈沉者宜麻黃附子細辛湯又曰二三日與麻黃附子甘草湯以二三日無里證故微發汗也此以其發熱為表證也然則其指為里證者何謂也曰心中煩而不得臥此其里證之一也曰腹痛小便不利四肢沉重疼痛自下利此其里證之二也曰下利不止便膿血此其里證之三也乃其始在二三日未有如此三里證者而反發熱脈沉其所以為無里證也此其未轉者也至於二三日之後見此三里證於是一則曰二三日以上以與黃連阿膠湯一則曰二三日不已至四五日以與真武湯一則曰二三日至四五日腹痛小便不利下利不止明其既與真武湯不愈以與桃花湯此亦為法也是皆其既轉者也凡此等之類皆概舉日之多少系之脈證示其轉機焉爾雖日數之不可強拘乎其不可視以忽諸大抵為然又有不曰一二日二三日而曰一日二日三日者如曰一日太陽受之脈若靜者為不傳云云曰二三日陽明少陽證不見者云云曰發於陽者七日愈發於陰者六日愈云云曰至七日以上自愈云云曰欲解時從某至其上曰過經十三日云云曰十三日不解云云曰到經不解云云曰三日三陽為盡三陰當受邪云云曰至陰經上轉云云曰後經中雲云之類是也雖均之以日數乎與其取之於概曰一二日二三日自不同也乃必之於此曰一日二日三日者蓋取諸素問也素問之於說一日太陽受之經各一日至厥陰凡六日是為前經至七日再還太陽復至厥陰是為後經過此以往十三日為過經遂又至有誤下越經等之傳也此不取之於概而必於此者也必於此者推之於理者也推之於理者施於事必差仲景氏之於論皆施於事者也奈何從夫理之為而今及於此者蓋後人謬窺仲景氏所論之似乎素問之說取以自補者遂傳於今耶亦不可不擇矣故今以其取於概者為正如其必於此者則舍㫋若以其必於此者取之於概則尚無害也或固執而屈理則固非也又或並其正者棄之則非之又非豈足與議仲景氏之道也矣哉挈因命證疾病之於變化各有外候外候謂之證證必有因謂其所由來者為因也凡論脈證之中有挈因而命證焉者如曰心下有水氣曰脅下有水曰胸中有熱曰胃中有邪氣曰胃中乾燥曰胃中不和曰胃氣不和曰胃中有燥屎曰胃中空虛曰胃中虛冷曰里有熱曰里有寒曰熱入血室曰熱結在裡曰熱在下焦曰熱在膀胱曰瘀熱在裡曰寒濕在裡曰水結在胸脅曰冷結在膀胱曰裡寒曰胸有寒曰寒實曰熱實曰熱越曰熱利之類是也是既挈而命之也在於仲景氏仲景氏各盡其所由來具其外候使以規則也不必索之於藏府於內當索之於外候焉而已乃其於外候也乾嘔咳喘渴噎所以心下有水氣也腹中雷鳴所以脅下有水也欲嘔吐所以胸中有熱也腹中痛所以胃中有邪氣也大汗出煩渴所以胃中乾燥也乾噫食臭所以胃中不和也惡熱讝語所以胃氣不和也不大便六七日腹滿讝語潮熱或腹滿痛或繞臍痛煩躁發作有時所以胃中有燥屎也下之後為胃中空虛也自下利為胃中虛冷也不大便十餘日復往來寒熱或潮熱讝語或大渴舌上乾燥而煩欲飲水數升為熱結在裡亦為里有熱也汗自出而渴為里有寒也經水適來或斷或下血胸脅下滿寒熱發作有時讝語如見鬼狀為熱入血室也少腹鞕滿或急結小便自利其人如狂或發狂或一身手足盡熱為熱結膀胱亦為熱在下焦也少腹滿按之痛手足厥冷為冷結在膀胱也身黃如橘子色大小便不利而渴為瘀熱在裡也身目為黃小便不利而不渴為寒濕在裡也往來寒熱但頭汗出為水結在胸脅也下利清穀為裡寒也胸中痞不得息或心中滿飢不能食為胸有寒也心下鞕痛無有熱氣為寒實也心下鞕滿而痛不大便數日為熱實也不大便發熱汗自出為熱越也下利欲飲水為熱利也各盡其所由來具其外候使以規則者若此故欲循規則於仲景氏者當索之於外候焉而已何必索之於藏府於內也哉方證互略處方之從脈證也對舉以詳悉焉然後或舉證而略方焉或舉方而略證焉見證而知方見方而知證所以使人自得於轉機之道也如柴胡之於嘔白虎之於渴則證之所定也故於此二者舉證而略方焉乾薑附子湯曰下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴桂枝附子湯曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴此其於證皆似柴胡及白虎而異故舉證之所定以略其方使之不混也曰此而有嘔即有柴胡此而有渴即有白虎如承氣之於胃實四逆之於厥冷則方之所本也故於此二者舉方而略證焉調胃承氣湯曰太陽病三日發汗不解蒸蒸發熱者屬胃也又曰傷寒吐後腹脹滿者此其於方固具胃實者也四逆湯曰若重發汗復加燒針者又曰病發熱頭痛脈反沉若不差身體疼痛當救其里又曰少陰病脈沉者急溫之茯苓四逆湯曰發汗若下之病仍不解煩躁者此其於方固具厥冷者也故於此二者舉方之所本以略其證使之不眩也此而承氣湯曰此里有實也此而四逆湯曰此欲厥冷也故舉證而略方舉方而略證者欲使人辨其證於微也又有承氣之略方焉者如論曰太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可是也又有白虎之略證焉者如論曰傷寒脈浮滑此表有熱里有寒又曰三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿若自汗出者又曰傷寒脈滑而厥者里有熱是也又有桂枝麻黃之略證焉者如論曰脈但浮者又曰脈浮者病在表可發汗又曰脈浮而數者可發汗又曰脈浮虛者宜發汗又曰脈浮無餘證者是也此皆使人審諦其證於若存若亡之中的然處其方也又有舉重而略輕焉者如桂枝湯之脈證而以麻黃湯四逆湯之脈證而以通脈四逆湯舉大承氣湯而略小承氣湯之類是也又有舉輕而略重焉者如麻黃湯之脈證而以桂枝湯大柴胡或柴胡加芒硝湯之證而以小柴胡湯通脈四逆湯之證而以四逆湯舉小承氣湯而略大承氣湯之類是也此皆使人知不必拘輕重緩急之常例而先後其處方之道也此轉機之大者也凡是皆或證或方略其所定之與其所本互以發其活用者也又有曰表裡證者即指柴胡證言之也此以其表之遠太陽而其里之未及陽明故取之於少陽以表裡連言爾蓋以其位於中間也既位於中間故但為之半猶可謂為半表半裡不可也何則或雖既及少陽乎猶有太陽之證也或雖既及陽明乎猶有少陽之證也或太陽之未罷而見陽明之證也是皆有表亦有里者也此何以不言之半表半裡而言並病若轉屬轉入乎表裡連言者本是指中位之稱而非半彼半此之稱也然則表裡連言者獨可於少陽而不可於太陽陽明可以知矣故但為之半猶可謂為半表半裡不可也方從表裡脈證之有陰陽而方劑之從之也有專於表者有專於裡者有間於表裡者此脈證有陰陽而方劑有表裡也三陽之為表也惟熱之主焉而又立表裡以辨其淺深緩急也太陽則桂枝湯麻黃湯桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯葛根湯桂枝加葛根湯大小青龍湯等此皆其專於表之劑也惟隨其脈證而不拘其腹候也陽明則白虎湯豬苓湯調胃大小承氣湯等此皆其專於裡之劑也必隨其外證與其腹候也少陽則大小柴胡湯柴胡加桂枝湯柴胡桂枝幹薑湯柴胡加芒硝湯柴胡加龍骨牡蠣湯黃芩湯等此皆其間於表裡之劑也亦必隨其外證與其腹候也三陰之為里也惟寒之主焉未必立表裡而辨其淺深緩急亦猶三陽也太陰則理中湯桂枝加芍藥湯及加大黃湯等也然若脈浮發熱則取之於表以桂枝湯也少陰則附子湯真武湯桃花湯白通湯四逆散當歸四逆湯甘草湯桔梗湯半夏散苦酒湯等也然若反發熱則亦取之於表以麻黃附子細辛湯及麻黃附子甘草湯也厥陰則四逆湯通脈四逆湯四逆加人參湯通脈四逆加豬膽汁湯當歸四逆加吳茱萸生薑湯吳茱萸湯等也此皆莫論其專於裡之劑亦必隨其外證與其腹候也又有始於熱而入於寒者如太陽有乾薑甘草湯乾薑附子湯芍藥甘草附子湯四逆湯茯苓四逆湯真武湯桂枝加附子湯桂枝去芍藥加附子湯桂枝附子湯甘草附子湯陽明有吳茱萸湯四逆湯之類是也有始於寒而出於熱者如少陰有大承氣湯厥陰有白虎湯豬苓湯白頭翁湯小承氣湯小柴胡湯之類是也凡三陽三陰之所主論在於傷寒之機變焉機變之百出遂及於雜脈證於是乎以其始於表者屬於三陽以其始於里者屬於三陰是故有熱之謂發於陽以表之主熱也無熱之謂發於陰以里之主寒也若夫及於雜脈證也有表仍不解者有其已解者如葛根黃連黃芩湯五苓散茯苓甘草湯小建中湯桂枝加厚朴杏子湯桂枝人參湯黃連湯等則兼表與里之劑也如桂枝去桂加茯苓白朮湯芍藥甘草湯厚朴生薑甘草半夏人參湯麻黃杏仁甘草石膏湯茯苓桂枝甘草大棗湯茯苓桂枝白朮甘草湯桂枝甘草湯半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯大黃黃連瀉心湯附子瀉心湯及桂枝加桂湯之於奔豚桂枝加龍骨牡蠣湯之於火逆桂枝去芍藥加蜀漆牡蠣龍骨救逆湯之於火邪梔子豉湯之於虛煩白散之於寒實茵陳蒿梔子蘗皮湯之於瘀熱發黃麻黃連軺赤小豆湯之於寒濕發黃大陷胸湯之於大結胸小陷胸湯之於小結胸瓜蒂散之結於胸中十棗湯之引脅下痛桃核承氣抵當湯之熱結膀胱四逆湯之冷結膀胱則皆專於裡之劑也又有表裡遞用者如桂枝湯之又於其氣上衝茯苓甘草湯之又於厥而心下悸是也夫脈證之有淺深緩急也方劑之不無坦夷徑駿於是先切其脈問心胸按心下探腹中候少腹試手足熱耶寒耶淺深是察緩急是視然後宜坦夷宜徑駿隨投則隨和矣或汗或吐或下莫適非和焉夫三陽三陰之統脈證而方劑之旋轉運用也猶循環之無端也惟仲景氏之術為然矣後之醫流或必於脈而不及腹或必於腹而不及脈泥一而遺一將欲以此而盡之耶夫疾病之千品萬端悉機於內而形於外焉乃候諸外而察諸內者惟脈之與證而已仲景氏之論脈證也有陰陽之分有輕重之別上之頭頂下之四支或心胸或心下或腹中或少腹飲食之多少前後之利不利各其外候之具並其脈診千品萬端莫所不盡焉脈證之所以相依不離也腹中之不可得而洞視候之於皮上則與脈診何異也若必以脈診為臆度則腹候亦無非臆度也脈不必遠腹不必近均之在於外候則脈猶證證猶脈也腹何出乎證之外也故曰隨證治之豈可泥其一而遺其一乎哉又或專補氣之說特癖坦夷之藥謂非此則必害人於是邪氣之太盛愈守而不竣終將不救矣又或熾鬱滯之說特癖徑駿之劑謂非此則必不祛於是精氣之既奪益攻而不輟遂將受敗矣及此之時告情而更醫繼之以坦夷之藥不日而痊者間亦有之矣至此而論曰此前因我之徑駿之劑其病已祛者也不爾彼之所與與白飲何擇又安能祛夫鬱滯乎若又使渠論之必曰彼之為術不問藏府不察虛實惟攻是務塵芥死生我乃與峻補之虛劑救其元氣幸免於死已倘猶委彼而逞其所為則就於鬼籍必矣彼則所謂慘刻之妄人也其相非也奚啻堅白所謂圓枘而方鑿何以能相入乎夫癖坦夷之藥者不知厚藥之妙也癖徑駿之劑者不見薄藥之效也此其人一試意不能忘癖從此始也其實則厚藥未必有妙薄藥非必無效要在於得其宜與否而已亦豈可泥其一而遺其一乎哉補氣仲景氏之所不言也論中惟見溫字一二於理中丸曰溫藥於四逆湯曰溫然皆非補之義也此本因痰飲為寒吐利為寒而二方之能治之也稱以為溫已然則與於小承氣湯及調胃承氣湯曰和何異亦惟治之義已豈可取之於補之義乎後世溫補之說蓋取於此可謂誤矣且有溫藥而無寒藥後之所謂寒藥蓋取於溫補之反亦可謂誤矣鬱滯亦仲景氏之所不言也理之於物猶影之於形也厝形而言影何不可言也疾病物也鬱滯理也厝物而言理何不可言也假令視以為水莫觀非水焉窺以為火莫候非火焉為氣為血為有餘為不足亦莫不皆然焉是故斷以為鬱滯何病非鬱滯也雖然以影度形則必乖以理推物則必失理雖或可言乎奈夫物何又何言鬱滯之為夫疾病之為物千品萬端也千品萬端則不得不眩惑於是仲景氏之誘人也統以陰陽系以脈證統而不遺系而不滿莫不隨其所在而備其方法焉則千品萬端又何所眩惑乎夫雖言百病之根柢於腹乎外內感之邪其謂之何此不必言根柢於腹也何則人皆稟天地之氣雖不知其所以然而有風寒暑濕行於其間焉於是不拘於體之強壯羸弱而時或感之矣其既感之也總名為邪邪之自外焉則能為熱脈必浮是之為陽其自內焉則能為寒脈必沉是之為陰陰陽各三矣乃其於三陽也惡寒發熱是為太陽為表於是與桂枝麻黃之劑而發其汗則其邪從去矣汗本是一身之津液也而今發之能得不耗損乎雖然非此則無有夫邪之可解是以一旦發之耳然夫邪之必有淺深也或一旦而不解漸為往來寒熱是為少陽為表裡於是與柴胡之劑而馳逐之則其邪從去矣此以其在於中間發汗吐下皆非其宜是以馳逐之耳及其最深也遂為身熱惡熱潮熱是為陽明為里於是與承氣之劑而下之則其邪從去矣胃本是津液之原也而今下之能得不涸竭乎雖然非此則無有夫邪之可除是以一旦下之耳此為三陽之概矣其於三陰也自利腹滿而時痛是為太陰而有理中桂枝加芍藥之方也但欲寐自利而渴是為少陰而有附子真武之方也吐利厥逆是為厥陰而有四逆吳茱萸之方也此為三陰之略矣而三陽三陰又各有其變脈證而方劑之從之也奚暇枚舉焉凡是皆外內感之邪而不拘於體之強壯羸弱豈可必言根柢於腹乎雖言百病之根柢於腹乎皆有外證具焉是故非並外證而推之必有所不盡矣姑舉一而言之假令少腹之急結鞕滿一也或手足煩熱或四支厥冷此為寒熱之分也乃其所推之在外證而處方之大不同也均是在少腹而候之於皮上則未足以盡其分也問其四肢並之於此儳足以盡之矣於是其手足煩熱為熱結膀胱其四支厥冷為冷結膀胱也熱結則桃核承氣湯抵當湯冷結則四逆湯也急結鞕滿之雖一乎惟是寒熱之分盡之於四肢豈非其所推之在外證而處方之大不同耶是故但按其腹而不並外證何以能盡矣也哉夫仲景氏之誘人也統以陰陽系以脈證千品萬端莫所不盡焉然則欲修仲景氏之術者不可不盡其所盡又何求之於他乎然今此之不務而取之於臆必於脈必於腹或補氣或鬱滯泥一而遺一厝物而言理此皆未盡其所盡所謂買櫝而還珠者也豈足與議仲景氏之術矣也哉數量藥有銖兩水有升斗而其煎煮之法亦不一焉古昔之所用何太密也舉其一二而言之以厚朴枳實大黃之三品名曰小承氣湯又曰厚朴三物湯又曰厚朴大黃湯惟此三品一無所更而異其名亦異其所之者以其兩數之與升斗與其煎煮之法也有苓桂甘棗有苓桂術甘有苓桂甘姜惟此三湯代棗以術代術以生薑而異其所之者亦以其兩數之與升斗與其煎煮之法也其他如此類不遑枚舉矣柴胡瀉心之於再煎大黃黃連之於麻沸誰知其所以然之故也惟度其所受之如何而已古人既稽其宜建以為法豈可以己之私而溷古人之正法哉是故銖兩升斗及煎煮之法不可不稽焉雖然年逝世換量衡亦沿革不一是以推之於史遷之於世觸乎類索乎物儳足以辨其概耳於是諸家有所互發焉近聞京師某生有所述某生亦有所録於彼乎於此乎如沸如激自非升平之化文運之融稽古之道六通四辟何以見斯盛哉雖然余未嘗一寓目是以不知其是非也曩歲肥後人村井生持其所撰藥量考來示之於余余倉卒讀過雖未能盡以其言乎猶記其義大抵如可據矣屬又我友備中人淺野生著稱量考寄謀之於余余亦往有所考既而失其稿欲更起稿未果得此著為幸乃閲其所考證與余之所推為不大相背矣故姑從其說而不論於此也村井生之所撰先行於世繼之以淺野生之所著而又復諸家之所發接踵而起則彼以讎對乎此得銖兩升斗之平正可企以望矣豈不愈快哉雖然醫之臨術也莫先乎審脈證焉藥品次之數量又次之矣仲景氏既論脈證為之規則不循其規則處方將何之據故莫先乎審脈證焉藥有種品因其土之厚薄氣味自不同氣味各愜仲景氏之所用而後疾可得而治矣若不愜仲景氏之所用雖得其脈證疾何以治故藥品次之矣銖兩升斗各有其分備然而量衡世有沿革不可得而一也縱有其所考不能無毫釐撮勺之差惟在其概耳若能致其平正而無毫釐撮勺之差不得其脈證則疾必不除惟其脈證之與藥品能得其所而不失則銖兩升斗之不致其平正而有毫釐撮勺之差疾何不瘳故數量又次之矣由是而觀之銖兩升斗之於醫事抑亦末也故醫之於務當以脈證為先而藥品為次然後及數量未為後矣數量之於醫事抑亦末也雖然古昔之所用太密則及其煎煮之法亦皆一規則也豈容忽諸哉且夫銖兩之於考必徵之於錢以其無他可以徵者也於是非半兩則五銖或貨泉又或開元錢等據以為徵矣以余謂之年逝世換之久輪郭銷燬則姑舍㫋雖未審古昔鑄錢之法如何乎視諸本邦今時所鑄之法作千萬模範𩰾溶銅鐵流入之於模範則千萬一舉而成矣未嘗一一修之形亦未嘗一一較其輕重是以不得少無大小厚薄之參差豈暇一一修之一一較之以齊一之哉雖古昔亦當然而已是故五銖未必五銖半兩未必半兩惟平均數十錢然後儳得其正耶而今取其一而齊視之豈其不差乎不知其徵之以五銖之果正耶又將以半兩之未正耶故考之一二為其概則可為無毫釐之差則不可也然銖兩固不可不密也何則古昔之為方既因此而異其名亦異其所之然而今果不能如古則末奈之何已縱不能無毫釐之差惟是醫事之末無已據於概而已故銖兩之於概亦豈容忽諸哉加減法夫藥也者性之偏者也非若穀肉果菜之常能養人也人之自有常也失常之謂疾惟疾乎能害於人為其能害於人服夫偏性之物謀以除之也乃同飲食入口也不得其肯綮則亦能害於人是故聖者猶慎焉古之精於此者能辨人之所以疾者與其所以除之者聚藥而制方欲使人之免疾而復常也於是乎醫之職興焉醫之職興而其詳不可得而稽焉暨臻張仲景氏論定而規則建焉規則既建而後人有依而據焉於是乎各有所窺亦未能一焉夫未能一焉又焉能一之也哉雖然我苟不一之於吾則術何所修也於是務一之於此以修其術乃取其所修以臨術於今幸見其不乖也則術其所以一之者我滿吾之腹焉爾矣夫藥也者性之偏者也非若穀肉果菜之常能養人也乃其已疾之能全是在於性之偏偏之能害於物即害夫使人之失常之物此之為藥之能也故藥之為能也惟利於疾而不利於人乃同飲食入口也不得其肯綮則亦能害於人豈可不慎焉也哉夫藥之為性也本是一味一能而不能兼衆能也是故方之於制也肇於一味而至於數味雖乃至於數味乎合為一方則未必治數證亦猶一能也何則其合數味而為一方也彼為此戮力此為彼所誘是故有如治三四證者雖乃如治三四證乎本之則必是一病證也故合數味而為一方則亦猶一能也仲景氏既有所稽於古能辨其所以然者因其方法或加或去為各半為二一極其變化致其妙用建之規則使人有依而據則莫不適其宜焉莫有所未盡焉此豈後人淺膚之識之所能窺測也哉夫既合數味而為一方僅能治一病證則欲一一析之以極其能不可得者固不少也惟其隨證而移也於其所或加或去不無一二之可以窺者也藉令能一一極其能又能辨雜之於合數味之方中果能趨其所欲令趨擅奏其效耶焉知不彼為此戮力此為彼所誘遂趨於他反為之害也哉於是乎知加減之難隨意為也譬諸五色糅布而成間色五味交和而成鹽梅焉糅布有分交和有節分紊則不成其色節亂則不成其味不成色則不文不成味則不旨不文則物不足以觀不旨則人不足以養色以美於觀為本味以厚於養為本矣加減之難隨意為也亦猶此也耶古之精於此者既能推夫觀之與養之為本為之分為之節使其不得紊亂亦惟彼為此戮力此為彼所誘能成其文能成其旨也若夫紊亂分之與節欲成其間色成其鹽梅耶焉知不彼為此戮力此為彼所誘遂趨於他不翅不文不旨反毀物害人也哉於是乎知加減之難隨意為也夫藥之為性也本是一味一能而不能兼衆能也試舉其一二則大黃以偏下之為能芒硝以能爍凝結為能於是乎若欲下宿食燥屎則必以此二物為主也桃仁能破新瘀血於是乎若欲下瘀血之新凝結者則必以此三物為主也水蛭虻蟲能破舊瘀血於是乎欲下瘀血之舊凝結者則必合此四物施之也由此而觀之雖大黃之偏下之乎非芒硝戮之力為其所誘則不能及宿食燥屎也雖芒硝之能爍凝結乎非為大黃所誘為彼戮力則亦不能及宿食燥屎也雖桃仁之能破新瘀血乎非上二物戮之力為其所誘則不能及其凝結也雖水蛭虻蟲之能破舊瘀血乎非為上二物所誘為彼戮力則亦不能及其凝結也桂枝能達於肌表以其能達於肌表乃驅其邪又上抵頭上內散上衝之氣又能之於四支雖其能之如及三四乎其實則一也麻黃能之於膚肉而驅其邪雖乃驅膚肉之邪未能達於肌表於是乎戮力桂枝為其所誘能得達於肌表發之於汗也葛根亦能之於膚肉而解其熱以其能之於膚肉又能之於項背而不能獨之於項背於是乎戳力上二物為其所誘能得之於項背發之於汗若反汗出則去其麻黃也此雖其能之如有二乎其實則一也麻黃之既能之於膚肉也又能止汗而不能獨止汗於是乎戮力石膏為其所誘能得止汗也此雖其能之如有二乎其實則一也石膏之既得麻黃而能止汗也又得知母粳米能已煩渴附子得乾薑能溫裡寒又得桂術苓能利水止疼痛緩屈伸厚朴得杏仁能祛喘又得枳實能減腹滿半夏得生薑能止嘔又得乾薑能除心下水氣凡此等之類不暇枚舉亦皆此為彼戮力彼為此所誘差其所之雖其能之如及三四乎其實則各一也他亦可例而推焉爾矣夫既如此也藉令能一一極其能又未辨雜之於合數味之方中果能趨其所欲令趨擅奏其效則豈可隨意而加減也哉夫藥之於能也惟利於疾而不利於人乃同飲食入口也不得其肯綮則亦能害於人不可不慎焉或曰今考仲景氏之方論既有去桂如桂去芍藥加芍藥加厚朴杏子加茯苓白朮加朮加大黃加芒硝加人參新加加半夏生薑加龍骨牡蠣加蜀漆牡蠣龍骨加吳茱萸生薑加豬膽汁及各半二一等此皆據古昔之方法對即今之脈證隨其宜而為之加減者也且於小青龍湯小柴胡湯真武湯四逆湯通脈四逆湯理中丸等之下詳設加減之法亦皆使人據此而及於他者也且疾病之能變而能化固不可概而論也仲景氏之論脈證惟是其概耳烏暇盡其變化乎於是不漆膠本論乃變乃化且加且減惟隨其宜是之謂能活乎術也仲景氏既試加減於當時又示其法於六方之下則今例於此而為之者又何不可乎然吾子獨漆膠其所概論之脈證強辨加減之難以為於今可謂拘泥之太甚矣曰吾子亦過矣大抵後之為方技者無不皆言如子之所言緣飾己之陋也仲景氏之於術非謂無加減也不審其規則徒取之於概隨意而加減將惟疾病是弄無乃不可乎若乃據夫例而為一二之加減猶無大害也甚則至於擬各半一二等之例不惟合二為一更復加之數藥欲兼盡數證也幸遇自愈者謂實由於加減之力也於是每證配藥而不足必將加減以不遺也此其所專不在於本方而在於加減也加減之果能兼盡而不遺則百證接踵而起固不足以為憂矣古人之制數百之方劑者迂闊之已甚又何使人迷惑也擇其緊要者則不過二三方而無所不足又奚煩數百之方劑之為仲景氏既有所稽於古能辨其所以然者因其方法或加或去為各半為二一極其變化致其妙用建之規則使人有依而據則莫不適其宜焉莫有所未盡焉此豈後人淺膚之識之所能窺測也哉夫既建之規則使人有依而據則其非概而論者諦矣規則之具於脈證也厝脈證而將何之由處方之從於轉機也厝脈證而將何之由然後處方在於我而加減不在於我也豈可徒取之於概隨意而加減也哉夫既處方在於我而加減不在於我故術之為治也不在於每證加減而在於察機處方也或不必兼治而分治各證或因一二異同而懸殊其所之或一方而二三其脈證或證相類而方不相類或藥多而證少或證多而藥少此乃仲景氏之所以能極其變化能致其妙用也如腳攣急而厥咽中干煩躁吐逆者與甘草乾薑湯厥愈足溫者更與芍藥甘草湯若胃氣不和讝語者與調胃承氣湯若四支厥逆者與四逆湯又有表裡證渴欲飲水水入則吐者不與小柴胡湯而先與五苓散又與瀉心湯痞不解渴而口燥煩小便不利者與五苓散又心下痞鞕乾噫食臭腹中雷鳴下利者與生薑瀉心湯而噫氣不除者與旋覆代赭石湯又腹痛小便不利四肢沉重疼痛自下利者與真武湯而下利不止便膿血者與桃花湯又服桂枝湯後大煩渴不解及服柴胡湯已渴者皆與白虎加人參湯則不必兼治而分治各證者也如桂枝湯治頭痛發熱汗出惡風者及其氣上衝者又加之桂二兩足前成五兩名桂枝加桂湯治奔豚又加芍藥三兩足前成六兩並膠飴名小建中湯治腹中急痛者及心中悸而煩者又去其膠飴名桂枝加芍藥湯治腹中滿時痛者又加之大黃一兩名桂枝加大黃湯治其實痛者又桂枝湯方中去芍藥名桂枝去芍藥湯治脈促胸滿者又加之附子一枚名芍藥加附子湯治其微惡寒者又加之附子二枚足前成三枚名桂枝附子湯治身體疼煩不能自轉側脈浮虛而澀者又去桂加朮四兩名去桂枝加白朮湯治其大便鞕小便自利者又桂枝附子湯方中減附子一枚去生薑大棗加朮二兩名甘草附子湯治骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者又桂枝湯方中加附子一枚名桂枝加附子湯治發汗遂漏不已其人惡風小便難四支微急難以屈伸者四逆湯治吐利煩躁四支厥逆無脈者及下利清穀者又去其甘草名乾薑附子湯治晝日煩躁不得眠夜而安靜脈沉微身無大熱者又去其附子名乾薑甘草湯治咽中干煩躁吐逆而厥者芍藥甘草湯治腳攣急又加附子名芍藥甘草附子湯治發汗病不解反惡寒者又四逆湯方中去甘草代蔥白名白通湯治下利脈微者又四逆湯方中加人參名四逆加人參湯治惡寒脈微而復利者又去附子代術名理中湯治霍亂寒多不用水者又加之桂四兩名桂枝人參湯治協熱而利利下不止心下痞鞕表裡不解者附子湯治少陰病口中和其背惡寒者及身體痛手足寒骨節痛脈沉者又去人參代生薑名真武湯治腹痛小便不利四肢沉重疼痛自下利者及太陽病發汗汗出不解仍發熱心下悸頭眩身瞤動振振欲劈地者茯苓桂枝甘草大棗湯治臍下悸欲作奔豚者又以術代大棗名茯苓桂枝白朮甘草湯治心下逆滿氣上衝胸起則頭眩脈沉緊者又以生薑代術名茯苓甘草湯治傷寒汗出者及厥而心下悸者小柴胡湯治往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔者又加之桂枝芍藥名柴胡桂枝湯治傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者半夏瀉心湯治心下痞鞕又加之生薑四兩名生薑瀉心湯治心下痞鞕乾噫食臭腹中雷鳴下利者又加之甘草一兩足前成四兩名甘草瀉心湯治下利日數十行穀不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安者又半夏瀉心湯方中去黃芩代桂枝加黃連二兩足前成三兩名黃連湯治腹中痛欲嘔吐者梔子甘草豉湯治發汗吐下後虛煩不得眠少氣者又去香豉代蘗皮名梔子蘗皮湯治身黃髮熱者又梔子豉湯方中如枳實名枳實梔子湯治大病差後勞復者又去香豉代厚朴名梔子厚朴湯治下後心煩腹滿臥起不安者調胃承氣湯治胃氣不和讝語者又去甘草代甘遂名大陷胸湯治實熱結胸心下痛按之石鞕者則因一二異同而懸殊其所之者也如桂枝湯行之太陽病頭痛發熱汗出惡風鼻鳴乾嘔者而又行之其氣上衝者及前證既愈身痛不休者也麻黃湯行之頭痛發熱骨節疼痛惡風無汗而喘者而又行之太陽與陽明合病喘而胸滿者及不發汗因致衄者也葛根湯行之項背強𠘧𠘧無汗惡風者而又行之太陽與陽明合病自下利者也小建中湯行之腹中急痛者而又行之心中悸而煩者也大青龍湯行之脈浮緊發熱惡寒身疼痛不汗出而煩躁者而又行之脈浮緩身不疼但重乍有輕時無少陰證者也五苓散行之脈浮小便不利微熱消渴者而又行之水逆及霍亂也豬苓湯行之脈浮發熱渴欲飲水小便不利者而又行之少陰病下利咳而嘔渴心煩不得眠者也茯苓甘草湯行之傷寒汗出者而又行之厥而心下悸者也小柴胡湯行之往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔者而又行之身熱惡風頸項強脅下滿手足溫而渴者及熱入血室與嘔而發熱者與傷寒差已後更發熱者也大柴胡湯行之嘔不止心下急鬱郁微煩者而又行之傷寒十餘日熱結在裡復往來寒熱者及傷寒發熱汗出不解心下痞鞕嘔吐而下利者也白虎湯行之脈浮滑表有熱里有寒者而又行之三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿自汗出者及脈滑而厥里有熱者也白虎加人參湯行之熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者而又行之傷寒無大熱口燥渴心煩背微惡寒者及服桂枝湯大汗出後大煩渴不解脈洪大者與服柴胡湯已渴者也調胃承氣湯行之胃氣不和讝語者而又行之發汗後不惡寒但惡熱者及自下利脈反調和者與陽明病不吐不下心煩者與心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩者與吐後腹脹滿者也小承氣湯行之小便數大便因鞕微煩者而又行之大便不通者及下利讝語者也大承氣湯行之陽明病讝語潮熱腹滿微喘大便鞕或不大便六七日有燥屎者而又行之少陰病二三日口燥咽乾者及自利清水色純青心下必痛口乾燥者也真武湯行之少陰病腹痛小便不利四肢沉重疼痛自下利者而又行之太陽病發汗不解仍發熱心下悸頭眩身瞤動振振欲劈地者也附子湯行之少陰病口中和其背惡寒者而又行之身體痛手足寒骨節痛者也四逆湯行之下利清穀裡寒外熱手足厥逆脈微欲絶者而又行之發熱頭痛脈反沉身體疼痛者及膈上有寒飲乾嘔者與下利腹脹滿者也吳茱萸湯行之食谷欲嘔者而又行之吐利手足厥冷煩躁欲死者及乾嘔吐涎沫頭痛者也則一方而二三其脈證者也如曰桂枝證醫反下之利遂不止脈促喘而汗出者宜葛根黃連黃芩湯曰太陽病外證未除而數下之遂協熱而利利下不止心下痞鞕者宜桂枝人參湯曰發下後腹脹滿者宜厚朴生薑甘草半夏人參湯曰吐後腹脹滿者宜調胃承氣湯曰下後心煩腹滿臥起不安者宜梔子厚朴湯曰少陰病六七日腹脹不大便者宜大承氣湯曰腹滿時痛者宜桂枝加芍藥湯其大實痛者宜桂枝加大黃湯曰腹滿痛者宜大承氣湯曰腹中急痛而嘔者宜小柴胡湯曰腹中痛欲嘔吐者宜黃連湯曰心下溫溫欲吐而胸中痛大便反溏者宜調胃承氣湯曰心下痞鞕嘔吐而下利者宜大柴胡湯曰不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹鞕滿而痛不可近者宜大陷胸湯曰不大便五六日日晡所發潮熱腹滿痛者宜大承氣湯曰胸滿煩驚小便不利讝語一身盡重不可轉側者宜柴胡加龍骨牡蠣湯曰腹滿身重難以轉側口不仁而面垢讝語遺尿自汗出者宜白虎湯曰身體疼煩不能自轉側不嘔不渴脈浮虛而澀者宜桂枝附子湯曰發汗後水藥不得入口為水逆宜五苓散曰少陰病飲食入口則吐心中溫溫欲吐復不能吐胸中實者宜瓜蒂散曰本自寒下醫復吐下之寒格更逆吐下若食入口即吐者宜乾薑黃連黃芩人參湯曰氣上衝胸起則頭眩脈沉緊者宜茯苓桂枝白朮甘草湯曰心下悸頭眩身瞤動振振欲劈地者宜真武湯曰心下痞鞕脅下痛氣上衝咽喉眩冒經脈動惕者宜十棗湯曰胸中痞氣上衝咽喉不得息者宜瓜蒂散曰太陽與陽明合病自下利者宜葛根湯曰太陽與少陽合病自下利者宜黃芩湯曰少陰病咽痛宜桔梗湯曰咽中痛宜半夏散曰吐利厥逆脈微欲絶者宜四逆湯曰吐利手足厥冷煩躁欲死者宜吳茱萸湯曰下利脈微者與白通湯利不止厥逆無脈乾嘔煩者宜白通加豬膽汁湯曰渴欲飲水口乾舌燥者宜白虎加人參湯曰渴欲飲水小便不利者宜豬苓湯曰脈浮小便不利微熱消渴者宜五苓散則證相類而方不相類者也如茯苓桂枝甘草大棗湯之於臍下悸也茯苓甘草湯之於傷寒汗出也半夏瀉心湯之於心下痞鞕也小建中湯之於腹中急痛也黃連湯之於腹中痛欲嘔吐也桂枝加芍藥湯之於腹滿時痛也厚朴生薑甘草半夏人參湯之於腹脹滿也桂枝加芍藥生薑人參新加湯之於身疼痛也桂枝去芍藥加蜀漆牡蠣龍骨救逆湯之於火邪也桂枝甘草龍骨牡蠣湯之於火逆也麻黃連軺赤小豆湯之於發黃也黃連阿膠湯之於煩不得臥也小柴胡湯之於嘔而發熱也白頭翁湯之於熱利下重也附子湯之於口中和背惡寒也牡蠣澤瀉散之於腰以下有水氣也則藥多而證少者也如甘草乾薑湯以治厥而咽中干煩躁吐逆者乾薑附子湯以治晝日煩躁不得眠夜而安靜脈沉無大熱者甘草附子湯以治骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡寒不欲去衣或身微腫者十棗湯以治漐漐汗出發作有時頭痛心下痞鞕滿引脅下痛乾嘔短氣者大陷胸湯以治膈內拒痛胃中空虛短氣躁煩心中懊憹心下因鞕者及不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹鞕滿而痛不可近者豬膚湯以治下利咽痛胸滿心煩者瓜蒂散以治胸中痞氣上衝咽喉不得息者及手足厥冷心中滿而煩飢不能食邪結胸中者吳茱萸湯以治吐利手足厥冷煩躁欲死者四逆湯以治下利清穀裡寒外熱手足厥逆脈微欲絶者則證多而藥少者也凡是皆雖或加或去或異一二或以此代彼乎非若極夫一味之能欲兼盡而不遺也何則其加者不必加證其去者不必去證其異一二者不必異一二其以此代彼者不必以此代彼也既加既去既異一二既以此代彼則各自一方而其所之之不同也既各自一方而其所之之不同此特在於仲景氏之術而不在於我我烏能辨其所以然者也哉仲景氏既有所稽於古能辨其所以然者因其方法極其變化致其妙用建之規則使人有依而據則其在於我而可行於今者惟此而已何必極一味之能隨意而加減之為若乃專於加減則不得不一一推其能也欲一一推其能則必有所窮窮則必強強則必馳既取脈證於概而專於其所馳則無所不至以此稱能活乎術術之為活亦終不難矣古人之既制數百之方劑仲景氏之或加或去為各半為二一極其變化致其妙用者非若夫極一味之能欲兼盡而不遺也此豈後人淺膚之識之所能窺測也哉然則數百之方劑及其或加或去為各半為二一者不在於仲景氏之術而何我惟由規則於此則轉機乎可以察而處方乎無不從也雖不極其能乎雖不為加減乎仲景氏之術之活果可行於今矣故術之為活也不在於每證加減而在於察機處方也術之為活亦已為難矣夫藥也者性之偏者也非若穀肉果菜之常能養人也乃同飲食入口也不得其肯綮則亦能害於人豈可不慎焉也哉且於六方之下設加減之法者皆依或字而為之也或也者蓋事之涉於二道而未必之辭也故今云或其或某者謂其兼證之有然者又有否者也此本非為加減言之也大抵論病狀有定證有兼證如定證則必之者也如兼證則未必者也姑以青龍柴胡二湯言之則青龍之定證至於發熱而咳柴胡之定證至於心煩喜嘔以下云或某或某者皆其兼證也乃其於兼證之然與否或疑乎異其方法也否於是云或某或某以明其不論然之與否亦能統而治之不異其方法也故依或字一一設加減者非仲景氏之意也此必後人之不辨此旨忽看或字謂此宜乎加減於是乎旁注加減之法者遂謬混正文也若果仲景氏之所設則奚啻於六方之下必當先肇之於桂枝湯已未見他於無或字者設加減之法者何耶必言今例於此而施之於他果見其效則加減之法何可廢乎殊不知此本統其或某或某者皆能治之固不須加減也況乎既加既去既異一二既以此代彼則各自一方而其所之之不同也乎故依或字一一設加減又例於此而施之於他者皆非仲景氏之意也不可從矣夫疾病之能害於人也服夫偏性之藥者本是不得已也乃其同飲食入口而受於胃也於其所受必有宜與否既雖此藥之中彼之病乎勢之不相應則反為逆或不逮也為逆則嘔吐而水漿不下痞為鞕鞕為痛不逮則數服而不見其效也非必此藥之不中彼之病也勢之不相應也故其所受之宜與否亦不可不稽矣古人既稽於此假生薑大棗粳米飴蜜之類伍之於藥以緩其氣以勵其力以宣布之以滋潤之此皆人之常所食養而非偏性之物也不必中其病各稽其入口受於胃之宜使其勢之相應能極其變化能致其妙用矣古者暇修之加桂姜膳羞之用棗栗飴蜜之類此非其入口受於胃之宜則何以施之食養乎然則今雖伍之於藥亦不得不皆然矣倘或謂既伍之於藥則異乎宜其入口受於胃之類耶惟是假此物緩之氣勵之力為宣布為滋潤而已豈有其宜乎食養者之更成偏性之物而中其病之理矣乎哉夫既雖此藥之中彼之病乎勢之不相應則反為逆或不逮也乃其同飲食入口而受於胃則其所受之宜與否亦不可不稽矣如桂枝湯之啜熱稀粥以助之力則欲使其逮也如柴胡湯及瀉心湯等之再煎以鈍之氣則使其不逆也桂苓甘棗湯之於甘瀾水大黃黃連瀉心湯之於麻沸湯麻黃連軺赤小豆湯之於潦水枳實梔子湯之於清漿水亦不得不皆然矣雖然稽其入口而受於胃之宜與否也在於古人我烏能稽之乎亦惟循規則於仲景氏焉耳矣且煎煮之法有宜猛火者有宜微火者若不得其宜則氣味或差差則雖此藥之中彼之病乎或不成其效也故煎煮之法亦不可不戒矣譬如煮茗之法先猛其火以沸其湯當其沸怒之時急投之茗一二沸而飲之氣味大佳若煮之以微火則氣少味澀而色徒成濃耳乃藥之於煎煮亦無不然豈可不戒矣乎哉且湯散丸之類古人既稽其所受之宜而肇之制為湯為散為丸則湯不可為散散不可為湯湯不可為丸丸不可為散若據便宜則何不取之於一乎故其為湯為散為丸者不惟稽其所受之宜稽其中於病而見其效之宜而已雖有若理中陷胸抵當半夏散及湯之類乎此稽其宜而肇之制也既在於古人我烏能稽之乎亦惟循規則於仲景氏焉耳矣服法醫之為術也在於察機而處方焉而其處方而作之也在備銖兩升斗及煎煮之法銖兩升斗及煎煮之法備而後藥可得而服也乃其服之也又各有法焉不可不慎以守矣如銖兩則姑舍諸升斗之隨而不一也煎煮之法亦隨而不一也不唯此而已服法亦復不一也其不一也各有其義而存焉非苟而已故煎煮之法與其服法抑雖復末也而是助我轉機之術而成之者也其為用也不輕而重矣緩急遲速多少各有其法存焉如桂枝加厚朴杏子湯桂枝加附子湯桂枝去芍藥湯及加附子湯桂枝加芍藥湯及加大黃湯桂枝加桂湯小建中湯桂枝去桂加茯苓白朮湯柴胡加桂枝湯麻黃附子甘草湯則以水七升煮取三升溫服一升日三服如桂枝湯則服至二三劑如麻黃杏仁甘草石膏湯白頭翁湯則煮取一升溫服一升如吳茱萸湯則分溫服七合如桃花湯則煮米令熟去滓溫服七合如桃核承氣湯則煮取二升半分溫服五合如葛根黃連黃芩湯則以水八升煮取二升分溫再服如附子湯當歸四逆湯及加吳茱萸生薑湯理中湯則煮取三升溫服一升日三服如真武湯則服七合如柴胡加龍骨牡蠣湯則煮取四升溫服一升如麻黃湯則以水九升煮取二升半溫服八合如大青龍湯則煮取三升溫服一升如桂枝人參湯則日再夜一服如小青龍湯葛根湯葛根加半夏湯桂枝加葛根湯茯苓桂枝甘草大棗湯厚朴生薑甘草半夏人參湯炙甘草湯茵陳蒿湯麻黃連軺赤小豆湯麻黃附子細辛湯黃芩湯及加半夏生薑湯麻黃升麻湯則以水一斗煮取三升溫服一升如大承氣湯則煮取二升分溫再服如黃連湯則煮取六升日三服夜二服如半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯則煮取六升去滓再煎取三升溫服一升日三服如白虎湯則煮米熟湯成溫服一升日三服如竹葉石膏湯則煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服如桂枝加芍藥生薑人參新加湯則以水一斗一升煮取三升溫服一升如桂枝去芍藥加蜀漆牡蠣龍骨救逆湯則以水一斗二升煮取三升溫服一升如小柴胡湯大柴胡湯柴胡桂枝幹薑湯則煮取六升去滓再煎取三升溫服一升日三服如小陷胸湯桂枝附子湯赤石脂禹餘糧湯乾薑黃連黃芩人參湯則以水六升煮取二升分溫再服如茯苓桂枝白朮甘草湯則煮取三升溫服一升分溫三服如桂枝麻黃各半湯則以水五升煮取一升八合溫服六合如桂枝二麻黃一湯桂枝二越婢一湯則煮取二升溫服一升如黃連阿膠湯則服七合如桂枝甘草龍骨牡蠣湯則煮取二升半溫服八合如芍藥甘草附子湯則煮取一升五合分溫服如茯苓四逆湯則煮取三升溫服七合日三服如抵當湯則溫服一升不下再服如茯苓甘草湯則以水四升煮取二升分溫三服如豬苓湯則再服如梔子豉湯及生薑豉湯甘草豉湯梔子蘗皮湯則煮取一升五合分溫再服如小承氣湯則煮取一升二合分溫二服如甘草乾薑湯芍藥甘草湯則以水三升煮取一升五合分溫再服如甘草湯則服七合如四逆湯及加人參湯通脈四逆湯及加豬膽汁湯則煮取一升二合分溫再服如桂枝甘草湯乾薑附子湯則煮取一升頓服如桔梗湯白通湯及加豬膽汁湯則再服如調胃承氣湯則少少溫服如梔子厚朴湯及乾薑湯則以水三升半煮取一升五合三服再服如大黃黃連瀉心湯則以麻沸湯二升漬之須臾絞去滓分溫再服如附子瀉心湯則內附子汁分溫再服其於丸散亦然如五苓散則以白飲和服方寸匕日三服如文蛤散則以沸湯和一錢匕服湯用五合如白散則以白飲和服強人半錢羸者減之如十棗湯則以水一升半先煮大棗取八合去滓內藥末強人一錢匕羸人半錢匕平旦溫服之如陷胸丸則如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取二升溫頓服之如抵當丸則四味杵分為四丸以水一升煮一丸取七合服之如理中丸則蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三服如瓜蒂散則取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之如四逆散牡蠣澤瀉散則白飲和服方寸匕如烏梅丸則丸如梧桐子大先食飲服十丸日三服稍加至二十丸故煎煮之法即制攻守之具者也而服法之用即就其攻守之事也緩急遲速多少其應之也各有妙契存於其中故醫之為術也在於察機而處方焉而其處方而作之也不唯在於銖兩升斗及煎煮之法亦莫不於服法焉服法豈可不慎以守矣哉發汗之法於桂枝湯則曰服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服病差停後服不必盡劑若不汗更服依前法又不汗後服當小促其間半日許令三服盡若病重者周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物乃於麻黃湯葛根湯亦如之唯不啜粥為異已故曰余如桂枝法將息及禁忌惟服法為然矣凡服藥之法日再三為度獨於發汗之法促其服者過常度若此是故獨於發汗之法乎方後惟曰溫服一升而不載再服三服等字以其服之至二三劑也獨於發汗之法所以禁生冷黏滑肉面五辛酒酪臭惡等物者蓋桂枝本以其香氣與辛味能奏其效也助之以熱粥之力麻黃亦假此而勵其力皆能得達於表而發其汗也當是之時若糅吃以此等之物恐彼奪桂枝之氣味與夫熱粥之力終喪其達於表而發其汗之效也然則此等之物何可不禁乎不獨於發汗凡當服藥之時食飲之將奪夫氣味而喪其效者亦不可不禁也故陷胸丸方後曰禁如藥法烏梅丸方後曰禁生冷滑物臭食等禁忌之不可全無也可以知已雖然此唯禁之在服藥之前後而非久之之謂也故為全無禁忌妄也又據此而久之泥矣下之之法必須惡寒止小便濁必須小便利屎定鞕必須汗多出發潮熱於是或宜調胃承氣湯或宜小承氣湯或先與小承氣湯益審燥屎之候而後及大承氣湯此之為法也故於調胃承氣湯則曰當和胃氣即一升為一劑少少溫服於小承氣湯則曰微和胃氣勿令大泄下又曰少少與微和之令小安又曰初服湯當更衣不爾者盡飲之若更衣者勿服之又曰若一服讝語止更莫復服又曰若一服利止後服此以一升二合為一劑分為二服也大抵煎煮之法雖有多少乎煮取三升為常也服藥之法雖不同一乎分服一升亦為其常也而今二湯之於煎煮與服法也若此較之於常則其作劑者三之一而其所服者幾減其半慎之至也於大承氣湯則曰傷寒不大便六七日頭痛有熱者未可與承氣湯其小便清者知不在裡仍在表也又曰手足濈然汗出者此大便已鞕也大承氣湯主之若汗出多微發熱惡寒者外未解也其熱不潮未可與承氣湯又曰陽明病潮熱大便微鞕者可與大承氣湯不鞕者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎乃可攻之若不轉矢氣者此但初頭鞕後必溏不可攻之攻之必脹滿不能食也又曰至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏須小便利屎定鞕乃可攻之又曰陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉矢氣者更服一升若不轉矢氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也又曰嘔多雖有陽明證不可攻之又曰心下鞕滿者不可攻之又曰得下余勿服此以二升為一劑分為二服其於煎煮與服法也若此較之於常則其作劑者三之二而其所服者不及於三以其非可數服之藥也亦慎之至也此之為服法也惟於白散十棗四逆之三方也有強人羸者之辨其所謂強人羸者當就病而辨不宜以常論也大凡人之於常各有其稟稟有厚薄強弱之差不可得而一也及其受病也未必不失其常既已失其常則向之強人今反為羸者而向之羸者猶保其強故曰強人羸者當就病而辨不宜以常論也病有輕重緩急藥有大毒小毒劑有大小多少參伍之而察其機商量之而適其宜是醫之術也夫巴豆甘遂附子皆是大毒之品也故非其最重且急之病則不用之矣然猶且不能無輕重緩急則何得無大小多少之略哉乃察其機而適其宜以料其勝藥之與否惟醫之術為然不然或用藥之太少而其力之微不足挫其勢也或其過多則瞑眩之甚殆且傷其正所以有大小多少之略也且夫證有一定而藥不可移易故醫之為術料病之輕重緩急與其人勝藥與否之強羸然後大小多少取之於其略故人稟之厚薄強羸在常而不在病也病人之強壯羸弱在病而不在常也故所謂強人羸者當就病之輕重緩急與勝藥與否而辨之不宜以常論也惟於斯三方所以有強人羸者之辨者以巴豆甘遂附子皆為大毒之品也於是乎強人一錢或半錢羸者半錢或減之大附子一枚而乾薑三兩是為大小多少之略也亦惟服法為然矣於論脈證之中及其方後發例者往往而有之各半湯曰脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢桂枝二麻黃一湯曰汗出乃解桂枝二越婢一湯曰脈微弱者此無陽也不可發汗大青龍湯曰若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也又曰一服汗者停後服小青龍湯曰服湯已渴者此寒去欲解也麻黃湯曰服藥已微除其人發煩目瞑劇者必衄衄乃解茯苓桂枝白朮甘草湯曰發汗則動經身為振振搖者梔子豉湯曰得吐者止後服桃核承氣湯曰下者愈又曰當微利抵當湯曰下血乃愈又曰不下再服抵當丸曰晬時當下血若不下者更服大陷胸丸曰一宿乃下如不下更服取下為效大陷胸湯曰得快利止後服白散曰病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯柴胡桂枝幹薑湯曰初服微煩服後汗出便愈十棗湯曰若下少病不除者明日更服加半錢得快下利後糜粥自養瓜蒂散曰不吐者少少加得快吐乃止甘草附子湯曰初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙白虎湯曰發汗則讝語下之則額上生汗手足逆冷茵陳蒿湯曰小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也吳茱萸湯曰得湯反劇者屬上焦也桃花湯曰若一服愈余勿服白通加豬膽汁湯曰服湯脈暴出者死微續者生理中丸曰服湯後如食頃飲熱粥一升許微自溫勿發揭衣被凡此等之類皆示處方之有將息者也將息之適宜服法盡於此焉亦豈可不慎以守矣哉後世煎煮之法作之不過一二錢之劑或以水一盞半或以二盞煮取一盞分之三五頻頻服之此其藥之與水與煎煮之法與其服法何不似古法之如此其遠乎亦將言人之稟賦有古今之差耶人之與天地參焉稟賦豈有古今之差乎且後世之與服法病之在上者必先食後藥為宜其在下者必先藥後食為宜嗟乎是何屈乎理之殊甚也夫藥也者除病之品食也者養精之物而各異其職則藥自藥食自食固不可相混也是以古之於服法自一升至五合為一服一日再三為度惟於發汗之法乎或促其服者此固在一時之略而不在數日之攻則何取之常度乎故古之於服法再三為度而無有如以一盞之僅僅分之三五頻頻服之之法也惟是服之不過再三則食藥自不相混者可以知矣若乃分之三五頻頻服之則食藥自不相遠食藥自不相遠則不得不相混也既已相混也一則欲除病一則欲養精二者其亦能不相鬥於內乎今夫服吐下之藥而不遠其食則或並而吐下之凡吐下之藥之見效也速則在頃刻遲不俟二時因此而考之食氣之行亦當在一二時之際也藥之能奏其效也亦不得不假以行其氣則何必先藥乎又何必後食乎然則如何而可乎古之於服法未嘗言食之先後也食藥各異其職焉固非可相混矣惟是服之在再三則相距之一時許而食而藥則食藥當不自相混耳然則雖今之服法亦宜措發汗之促其服者自一升至五合為一服日再日三或晝三夜二或晝二夜一隨本論之法而服之相距之一時許而食而藥食藥不相混則其庶幾哉又何必食前必食後之為又復何以一盞之僅僅分之三五頻頻服之之為
