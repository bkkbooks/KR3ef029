body:
  text: 卷五藏府三焦五藏六府者仲景氏之所不論也惟於藏論心於府論胃膀胱時又論三焦也然皆與後世之所説大不同也何者心胃膀胱及三焦之悉具於內不可得而窺也不直索之於內而各索之於外也乃索之於外也設其部位而為三焉大抵膈間為心位為上焦從心下至臍上為胃位為中焦少腹為膀胱位為下焦各具其外候而與其相符則為能盡而不遺也猶直索之於內也夫在膈間則其人之所自知而外候之所不及也如曰心中痞曰心中窒曰心中懊憹曰心中疼熱曰心煩曰心悸曰心中悸而煩曰心中滿而煩曰心中溫溫欲吐曰心中結痛曰結胸曰胸中塞曰胸中煩曰胸滿曰胸脅滿曰胸脅苦滿曰胸脅煩滿曰胸滿脅痛曰胸滿煩驚曰胸脅滿而嘔曰胸中滿而煩曰胸中實曰胸中有熱曰氣上衝心曰氣上撞心曰氣上衝胸曰氣上衝咽喉曰其氣上衝曰氣從少腹上衝心曰氣痞曰氣逆曰膈內拒痛曰膈上有寒飲之類是也至心以下則不惟其人之自知而外候以符之也如曰心下痞曰心下鞕曰心下滿微痛曰心下痞鞕曰心下鞕滿曰心下痞鞕而滿曰心下滿而鞕痛曰心下因鞕曰心下痛按之石鞕曰從心下至少腹鞕滿而痛曰正在心下按之則痛曰心下痞按之濡曰心下鞕滿而不痛曰心下必痛曰心下急曰心下悸曰心下結曰心下支結曰微結曰脅下滿曰胸脅下滿曰脅下滿痛曰脅下鞕滿曰脅下痞鞕曰胸下結鞕曰脅下痛曰引脅下痛之類是也若夫胃膀胱則專據外候以符之也如不大便或難或鞕為胃實潮熱讝語煩躁或腹滿痛或繞臍痛或喘冒不能臥或下利讝語為胃中有燥屎惡熱讝語為胃氣不和乾噫食臭為胃中不和大汗出煩渴為胃中乾燥腹中痛為胃中有邪氣自下利為胃中虛冷下之後為胃中空虛少腹鞕滿或急結小便自利其人如狂或發狂或一身手足盡熱為熱結膀胱亦為熱在下焦少腹滿按之痛手足厥冷為冷結在膀胱下利不止小便不利為利在下焦當吐者為屬上焦吐與下為犯胃氣及上二焦之類是也因是而觀之心胃膀胱及三焦之為上中下之部位各具其外候而與其相符則能盡而不遺也豈可與後世之直索五藏六府及三焦於內纏繞為之説不得其實者同類而語也矣哉且夫人之所以生者惟氣之與血也氣之與血無不在於飲食故飲食者氣血之原也其入於胃而化為氣血充盈四體潤養一身此乃人之所以生也如其糟粕余液則出為前後也乃飲食之各有分而前後之自從之此之為得常也若其飲食之太多太少而前後之或清或濁或數或澀非難則鞕或祕或溏此之為失常也雖藏府及三焦之悉具於內不可得而窺乎稽之飲食之與前後則惟胃中之可以度也乃具其外候而與其相符則能盡而不遺也猶直索之於內也且夫人之於身也內焉藏府三焦外焉四肢九竅各有官司不可一缺焉既而不可一缺也孰取孰舍孰重孰輕孰親孰疏孰先孰後雖然其最要者莫逾於胃焉生也在於茲死也在於茲疾湊於茲藥適於茲故人身之為要也胃之為最焉惟胃中之可稽而度也有飲食與前後之在則外候之不得不肇於此既其餘液之從胃溉致於膀胱而為前溲也膀胱之可稽而度者有清濁數澀之在則外候之亦不得不由於此如膈間則固其人之所自知也因審其所知而取之於外候也亦猶胃膀胱也故雖藏府及三焦之悉具於內不可得而窺乎既設上中下之部位各具其外候而與其相符則能盡而不遺也猶直索之於內也所以惟於藏論心於府論胃膀胱時又論三焦也此豈若他藏府之不可得而窺而外候之無可稽而度也矣哉自素難之説藏府三焦而後世直索之於內議論紛呶五為六六為五心包命門實如洞視然遂至盡配之藥曰入某藏之某經補其藏導某經論仲景氏之所未論而聳動人心耳此其説之出乎議論也不乖其實者幾希假令發解藏府極盡其布置色味斷續長短大小分寸脈理之所通經絡之所繫而烏能得窺度其藥之合五七味若十數味為一方也既服之後復能別入某藏之某經否補某藏導某經否果能治其疾乎又將為害乎哉夫既肝腎肺脾膽心包命門大小腸之不可得而窺而外候之無可稽而度也又何有治法之可索也仲景氏之所以不論及於此也因是而觀之與以吾之淺膚之識搜索夫難窺難度之藏府也寧服膺仲景氏之教以就此易窺易度之外候也然後能識此藥之敵彼之疾不過而謬則吾其愈快也已矣是故至如肝腎肺脾膽心包命門大小腸之不可得而窺而外候之無可稽而度也則姑舍旃吾將惟從夫心胃膀胱及三焦之為上中下之部位各具其外候而與其相符則能盡而不遺也已矣榮衛榮衛之出乎素難焉後世敷演其説傷寒為陰邪為在榮分中風為陽邪為在衛分配麻黃於榮配桂枝於衛且以所為無熱惡寒者發於陰也見以為即未發熱必惡寒者也此等之類殊為不通何則陰陽本是表裡之統名也傷寒中風者輕重之別也陰陽以統表裡輕重以別風寒非以風寒為陰陽也故陽邪陰邪惟以三陽三陰言則可以傷寒中風言則不可也無熱與未發熱不同無熱者本以三陰言無表證之謂也有熱為表故其有熱而惡寒者知其在表位故曰發於陽也無熱為里故其無熱而惡寒者知其在裡位故曰發於陰也此主病位而言之也未發熱者雖未見其熱而頓將發者也而非若三陰之無熱也對已字而云未惟言有其先後已云無雲未辭亦自別豈可混同以視之乎又豈可以風寒為陰陽乎夫榮衛者氣血之別稱也素難之所説詳悉莫以尚焉榮衛之名蓋昉於此而其書則成於仲景氏之後也謹按本論言榮衛者僅二三因審其語脈不似仲景氏之辭氣也且治法之於榮衛必不可不言則何不肇之於桂枝麻黃之初乎此果後人之説謬混於此者歷然也氣血字論中一無有也雖然於發汗吐下後及下利之證每論亡津液津液越出及亡血之等殊為緊要則其旨雖不同而其名言之也為不大相遠矣然如仲景氏之所論則所見盡在於外證焉後世遂取之於臆有汗多亡陽下多亡陰等之説而汗多亡陽見於大青龍湯救逆湯之條及陽明篇然其云亡陽及虛皆非古義亦必後人之説耳桂枝二越婢一湯之條曰無陽少陰篇曰亡陽又曰陽已虛亡無通陽謂表也無陽者謂表證已解也陽已虛者謂表證已解惟精氣未復也即與陰陽俱虛同古義為然矣古語曰百病生於氣氣即俠氣勇氣浩然之氣氣力血氣之氣也言病機百出一由氣血之鬱結也後世誤解為心氣之氣也謂人之苟苦思勞心於事則必敗心矣因名以心氣不足與之以藥欲以救且補之也夫藥也者性之偏焉者也豈可能補其不足乎又豈可能救其勞苦乎若惟言因其勞苦而氣血鬱結致此之疾則猶可然後隨其脈證而處之方則其何不可乎假令人之苦思勞心於事於此乃其事之頗從己之意則必不俟藥而思弭心弛矣若不從己之意則愈苦愈勞而思奚弭心奚弛矣當是之時莫有能救且補之之良藥也醫乃命之字而稱勞疫則人亦乞之藥豈非惑之已甚乎虛實虛實之名必起於人之失其常也而強弱之稱必因其體之常質也故虛者精氣之奪實者邪氣之盛邪氣之實攻之以草木蟲石精氣之虛養之以穀肉果菜乃今以草木蟲石謂為補精氣抑亦醫法末路之失也何以言之張仲景氏之論虛也必於精氣如曰陰陽俱虛曰惡寒者虛故也曰胃中空虛曰胃中虛冷曰虛煩曰虛則鄭聲是也其論實也必於邪氣如曰胃實曰內實曰寒實曰熱實曰熱者實也曰潮熱者實也曰實則讝語是也夫精氣之於人也重孰大焉能護四體也邪氣之於人也害孰甚焉能賊五內也精氣者生之所憑故不可不養焉養以穀肉果菜此之為法矣邪氣者死之所創故不可不祛焉祛以草木蟲石此亦為法矣蓋胃之為府也收夫穀肉果菜而精氣委源於茲所以最為重也邪氣之盛也精氣為之奪所以最為害也故虛實皆主胃而言之邪氣之實於胃仲景氏之所深懼焉故於府惟言胃也故其所謂實者皆以胃實言之不獨大便難鞕也凡人之於常無有虛實失常而後有虛實於是乎論焉素問曰邪氣盛則實精氣奪則虛又曰邪之所湊其氣必虛又曰攻邪以毒藥養精以穀肉果菜此蓋古語之最純粹者也邪以無為常故曰實曰盛曰攻精以有為常故曰虛曰奪曰養皆主胃而言之者彰然而明哉夫人之於胃也譬如水缸乎胃也者收穀肉果菜之府也缸也者貯水之器也收而充之此其常也貯而滿之亦其常也於是投缸中以一拳石則如之何邪之於胃其猶缸之於石乎石本非缸之所貯也邪本非胃之所收也既投之以一拳石則水必湧溢乎外也邪之害乎精氣亦猶如此乎故謀去夫石此即鉤匕杈䉗之道也謀祛夫邪此即草木蟲石之術也以此之道既去夫石則水必減矣以此之術既祛夫邪則精必虛矣水之減非鉤匕杈䉗之所能加也精之虛非草木蟲石之所能補也然則如何而可乎亦惟加之以水養之以穀肉果菜而已矣夫缸貯水以備用胃收精以保生貯之有分分不可強懼石之投也收之有節節不可逾懼邪之實也石愈大則水益減邪愈盛則精益虛石之不可不去也水何不加邪之不可不祛也精何不養是故仲景氏之論虛也必於精氣精氣者生之所憑也其論實也必於邪氣邪氣者死之所創也虛實之分可以辨而已矣後世不辨此等之分於人之常而論其虛實以混之於強弱是以精氣必論邪氣亦必論抑亦醫法末路之失也凡人之於常無有虛實失常而後有虛實於是乎論焉豈可以常而論焉哉虛實強弱本不同道虛實自虛實強弱自強弱固已不可混而已矣然則精氣之虛果不可補乎曰精氣之生於穀肉果菜也氣為之化邪氣湊於胃也精氣不得不奪猶投石於缸中其水必減此所以邪曰實精曰虛也邪是草木蟲石之所與精是穀肉果菜之所與此所以實曰攻虛曰養也故精氣之虛欲以草木蟲石補之非法矣何則草木蟲石猶鉤匕杈䉗也鉤匕杈䉗所以去夫石之具而非所以加水者也草木蟲石所以祛夫邪之毒而非所以補虛者也具豈能加水乎毒豈能補虛乎補虛之説至此而窮矣故精氣之虛惟有穀肉果菜之養已豈有草木蟲石之補乎哉是故虛實之於分不可不善辨焉死生凡醫之為職也死生之所繫焉藥能活人藥能殺故死生有命亦不得謂之命則是醫之責也是以作劑之法必權其體之強壯羸弱與其病之輕重緩急與其藥之大小多少者也慎之至矣夫人之至重者莫死生若焉死生皆命也雖壽之期於百歲乎七十之為稀而札瘥短折之亦不少也凡天下之人其幾億萬何其以病斃者之最多而其以壽終者之最少也病乎百之九十九而壽乎僅一而已僅一之命而九十九之非命耶豈非非命之最多耶莫論壽夭之與疾病自經自屠畏壓溺或為罪所刑是皆非自然而然則謂為非命耶然其於死一也若質之於聖人則必謂之命何則上自王公而下至衆庶各有其事實命不同死生皆命也生於其所而死於其事有常有變命之不可奈何也故莫論壽夭之與疾病自經自屠畏壓溺或為罪所刑雖其非自然而然乎亦皆始於其常而終於其變者也聖人之所以謂為命也雖然醫之為職治人之病者也治之不瘳使人死其病也則於其職謂之何也縱其人之命於我乎不得不為非命矣故其瘳之與否不可不論焉醫之於術得之則生失之則死死生之繫於醫也不可不慎焉稽諸往昔能辨死生是為醫之良後世又謂為司命之職亦似為不誣矣夫先王之設醫之職也惟是恤人之疾苦使其免於死此先王之仁也凡人之於疾苦急則頓將死緩則引年月終亦將死能祛其疾苦使其免於死惟醫之術已術之非無工拙故其病已瘳之後精氣不繼而死或未及瘳困悶而死其於死一也以其已瘳為命以其未瘳為非命耶此惟醫之所知而非先王之所問也恤其疾苦使其免於死此先王之仁也何暇論其已瘳之與未瘳乎故其所視於醫也獨在其死生以獨在其死生故論其工拙亦惟以此制其祿秩亦惟以此為之黜陟亦惟以此此先王之所建確乎不可易矣死生之所以繫於醫也周禮曰以五氣五聲五色視其死生又曰死終則各書其所以而入於醫師又曰歲終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下少曰死老曰終醫師掌醫之政令故録其不瘳之狀以告於醫師醫師以此論其工拙以此制其祿秩以此為之黜陟以為後世之戒也失四為下者五之為半或不治而自瘳故十全至失四祿秩之差分為五等也先王之設醫之職也恤人之疾苦使其免於死此先王之仁也是以不録其已瘳之生而録其不瘳之死不啻為後治之戒亦慎之至矣以其所視於醫之獨在其死生也若其術之於工拙惟在於處方處方之能愜其脈證是之為得不愜其脈證是之為失得之無失為工也失而無得為拙也脈證不可不明矣處方不可不愜矣明之以仲景氏之規則愜之以仲景氏之規則醫之於務惟在仲景氏之規則是審焉爾矣夫藥之為品也古者概以為四等有大毒有常毒有小毒有無毒草木蟲石之外五味五穀亦伍之於方以從其宜固不可一為毒乎周禮曰以五味五穀五藥養其病此其不一於毒之故不曰治而曰養古之術為然然今之為醫者或代疾以毒更藥以毒以為能盡百病以歸死於命謂死生之自在於彼稽諸古昔未嘗有如此者也又有疑乎周禮以為漢儒之偽撰也縱令周禮可疑距古不遠而古言尚存且其流本出於先王之道也非醫之所可以議也先王之道御邦家之道也醫之道治疾病之道也邦家之大疾病之小固異其倫固不可混同也若疑乎其言之不契於己則奚翅周禮也醫而議先王之道非僭則妄矣嗚呼人之至重者莫死生若焉當其有疾與之於藥若不得其宜不但其不瘳甚則至於死至此謂藥之不殺人而可乎自古有藥殺豈非藥之殺人乎今夫中藥之毒而煩亂困悶謂之瞑眩瞑眩之太甚不得不至於死故如巴豆甘遂附子之類必因其強羸有半錢一錢之分此權其強壯羸弱與病之輕重緩急與藥之大小多少者也不爾或過或不及詎得謂之術乎醫之於術得之則生失之則死死生之繫於醫也豈可不慎焉哉三權醫之臨術也有三權焉何謂三權乎一曰體位二曰病位三曰藥位體有強壯羸弱之分病有輕重緩急之勢藥有大小多少之略各辨其位以識之於躬而蔽之是之為三權也三權之相持而不愆是之謂能執術也仲景氏之統脈證於陰陽建之規則也三權自具於其中焉而臨術之要全盡於茲不可不辨矣若夫體之羸弱而病之重且急無乃危乎病之重且急而藥之小少無乃不及乎病之輕且緩而藥之大多無乃過乎不及之與過皆其術之已失也及其甚也不度強壯羸弱輕為重重為輕緩乎急急乎緩小大失宜多少異處豈其不忒乎及其最甚也或拘吐方或泥下劑拘吐方者當汗必吐之當下亦必吐之泥下劑者當汗必下之當吐亦必下之豈不乖乎皆取之於己而不辨三權者也是以己雖誤之乎不能自顧人之爰死也必歸之於命嗟乎誣之殊甚惟其至於此乎實己之由盍自恥自悔為後治之戒乎夫強壯羸弱之於分輕重緩急之於勢莫不隨其分之與其勢而制之其何無大小多少之略也若果拘泥乎一則必有如割雞用牛刀者此謂之過也又必有似解牛用雞刀者此謂之不及也過與不及固非術也是故體與病之位在彼惟藥之位在我也非辨我之與彼之位以識之於躬而蔽之何以相持而不愆乎哉仲景氏之統脈證於陰陽建之規則也三權自具於其中焉而臨術之要全盡於茲則我將辨之以仲景氏之規則規則之體於我三權盡是我之有已然後如牛刀之直解牛雞刀之直割雞也已矣又何取之於己而拘泥乎一之為仁術後之業醫者自許以仁術曰我之救民之疾苦之著於今也不類儒之間然無事之邈乎古也嗟乎何其言之謬且恣乎此其視仁也蓋取諸慈愛惻怛之心也慈愛惻怛之心固不足以盡仁矣夫仁之至廣至大之難言固不可言於醫也何則先王之御邦家也貫乎百爾者特在於仁焉無論乎慈愛惻怛之心使人人各得其所事乎其事以安其心以終其身也惟仁之化為然及其化之及也雨露之所降舟車之所通莫遠弗及焉惟仁之化為然豈非其至廣至大之難言乎故仁者合德與行之名也雖德與行之名衆乎莫有出於仁之上焉者也又豈可言之於醫乎哉醫藥之設肇於先王則其仁在於先王焉而醫之所任不在於仁而在於其職焉乃其於職也猶百工之各以其事以供上之用以應下之需也乃其於朮也亦不能無巧拙於是分祿秩之差以為五等此先王之制也雖今之不似古之制而祿秩之差率從其巧拙則近之矣若其無官祿者為人治之疾則人必報之以幣也或賜祿或受幣食於其業則一也故醫之食於業也亦猶百工之食於事也豈可獨私於仁而緣飾己之小技乎哉縱令辭其幣施藥於四鄰惟是一小惠未足以煩仁之名也而今不惟受其幣而其稍菲薄或怒而咎之則惠之名猶無有也而況於仁之至廣至大之難言乎醫之伍之於下謂為小數小技非必賤之也蓋聖人之御邦家也莫不包裹焉是以一技之蕞舉以備數醫亦與焉皆聖人之用也聖人之用廣矣大矣以此而觀乎彼則何技之不小乎此其所以謂為小數小技也醫之既為我之任也系人之命期則研究之入於腹心精核之徹於骨髓而後可以發之於其術矣是之謂共天職也然則醫之任於我孰大焉故苟居業於此也豈可小以自視而賤夫天職乎哉不可不慎矣夫醫之任之系人之命期之重也不在於仁焉而在於天職焉惟天職之慎而研究精核之務夫然後庸與否有命之在知命而安焉雖身為賤業無害乎為君子矣又民者君上之辭也而非吾儕小人可呼之稱也已儳業於醫何免於民既不免於民呼人以民可謂僭妄矣故民者非對君上則不可呼之稱也因此而觀之所謂仁術及救民皆君上之事而惟儒之所修其不可言於醫也審矣古今方方法之言古今也建極於何之時而為古為今乎以今而視宋元之時邈乎古矣豈可以今言之哉故必先建之極而後古今可得而言而已矣其於古也雖有和緩俞胕文摯扁倉等而其方法不傳則何以建而為之極乎及東漢之時有張氏仲景獨作傷寒之論以傳其方法乃其所論也不惟傷寒而方法之具莫正焉方法之傳莫古焉既而其論定於仲景氏而其書出於仲景氏則古之於方法當委之於仲景氏建以為極而已又曷議之為然後之言古方者或謂周官之遺篇或謂扁鵲之遺法此皆不委之於仲景氏強而議之者也豈非穿鑿之殊甚乎當西晉之時有王氏叔和其所著之脈經蓋出於其獨得之識也於仲景氏之術莫或大裨益惟其務於傷寒論而傳之於後世者此其功之偉者也當唐之時前有孫氏思邈後有王氏燾而孫之撰千金方王之纂外臺祕要方各設病門而傷寒為一門者既非仲景氏之旨也是以雖博輯群方而不獲其大要何以盡行之於今乎故二氏之於方法不可不擇焉擇之有善有不善先以獲仲景氏之旨為本乃適於此而擇之也其擇在於仲景氏是為其善者也不適於此而擇之也其擇在於己之私是為其不善者也夫既擇之以其善者然後其可以行於今者僅不過十之一二乃取其一二以弘仲景氏之道則方法之莫不該備焉於是乎建極於仲景氏而弘道於二氏我乃呼以為古不亦可乎至宋元之時有諸名家亦莫不皆祖述焉雖然率囿於素難不能逾短牆也而謂古不愜今遂還轅軛肇方法於我而擅攪舊轍於是乎歧為二途仲景氏之術幾熄而專為宋元之流我乃呼以為今不亦可乎古今之不可妄言也建之極者為然矣而今之為宋元之流者動輒曰人之天稟有古今厚薄之差嗟嗟是何其言之謬乎夫雖古今異乎天地萬物固無有古今天地萬物既無有古今而獨人為有古今厚薄之差者最為無謂矣何則人壽百歲雖古實稀故僅載之於史或傳之於言然則札瘥短折之人果其無有乎古何異於今也雖今之漸及季衰而百歲之人果其無有乎今何異於古也豈獨人而有古今厚薄之差乎哉可謂謬矣雖然姑從其説而論之古之人之果厚而今之人之果薄方其有疾也則治之以藥藥也者草木蟲石也草木蟲石亦與人同受天地之氣以生於其間古今厚薄亦惟從以移也則古之人之厚也必以古之藥今之人之薄也必以今之藥古之所愜而今何不愜乎因此而觀之人與疾與藥固不出於天地之外而受之氣也則古自古今自今厚自厚薄自薄無不從以移矣豈取古之藥而行於今之人乎哉況於日月之系星辰之羅四時之行百物之生彌乎萬古萬今而不竣其政令焉乎然則於人亦無古今厚薄之差可以知矣惟其於天稟不在於古今而在於人人人人之於厚薄及其臨疾而行藥也必從為之酌量此亦何有古今乎然強為古不愜今之説不但誑庸愚雖有識之人殆誘其黠言豈非妄誕之甚乎哉若及近世好古之士頗多而無不熟西漢以上之書不翅儒術再闢榛棘醫亦幸得復古之時及仲景氏之術於是唱古之方術於本邦者先有丹水先生而繼起者為艮山先生此其嚆矢也而繼之者為秀庵先生各有著作而行於世然於仲景氏之書則有所未盡矣又繼而起者有若一間齋先生有若東洋先生有若東洞先生亦各雄於當世者也然於仲景氏之書則猶有所未盡矣獨如東洞先生則張識於扁鵲而睥睨於仲景一術於掌握以屏議論之喧不歆輕薄之譽不屑睚眥之毀先生之於業可謂達矣於先生則既達矣後進之受其業者恐不達其所達也世有稱古方家者特取方於仲景氏如其脈證則不必從仲景氏也因試問之則曰此經驗之方且曰仲景本非聖人也何其無缺遺矣後世謂為醫之聖不亦謬乎如其傷寒論則自好方技之篤隨得而所筆固不足以為規則醫之於術方而已矣察其證以處之方則在於我也何拘仲景之脈證之為也且今之病疾者能愜其脈證者固少若拘於此則其鮮不失乎故度其宜以處之此我之術也嗟此何言與嗟此何言與夫如此則醫之於術不在於古而在於我也其在於古者特方而已特取其方而擅於己則果不能出於宋元諸氏之上也豈足以古稱之哉夫方法之能得其要領而詳悉莫所不至者孰若仲景氏也如宋元諸氏則其纖密逾於仲景氏頗陷於鑿空此失之於深者也如所謂古方家則惡夫鑿空遂馳於疏漏此失之於淺者也欲以此而盡於百病不可得也術之將窮乎於是病者以其治驗之終不能如其言致咎於醫醫則以其服醫之不遂從其指揮歸罪於病者其相責也若此而不知其是非也此惡能勝宋元之流而上之哉要之如宋元之流則猶遠乎害以其失於深也如古方家則殆近乎害以其失於淺也深之與淺兩不得其中能得其中者莫如仲景氏焉故仲景氏之脈證不可不循者也豈特取其方而已哉且其所謂經驗者在其始也將何之據乎又將試以己之妄乎此芥蒂其人也仲景氏既論脈證以為規則焉而去其規則從己之經驗也然己之經驗本由於仲景氏而不由於己此不信仲景氏之規則而信己之妄者也若必以經驗言之則或載於書或傳於人者何方之非經驗也夫疾病之似而類者固不少矣故其於方法不滯於一又不眩於百此之為要也若其脈證之既移也不可不從以轉焉然因循不轉及其脈證之既大移而己之處方愈遂不轉自謂雖一二之出入何隨以轉之為有特操者之術當如此矣此豈非滯於一乎脈證之未移也不可不從其舊焉然己處之方則數轉不處朝轉而夕轉自謂雖一二之出入不可不隨以制之臨機應變之術當如此矣此豈非眩於百乎及其最甚者則建二三之主方而加減以施於百病自謂醫之術盡於此矣此其方之與加減皆自乎己者也疾病之於情狀有止於一焉者有之於二三焉者以其之於二三焉者而一之則不可也以其止於一焉者而二三之亦不可也彼亦一不可此亦一不可於其不得其要則一也欲得其要則莫若循仲景氏之規則焉乃其於規則也有不必兼治而分治各證者有因一二異同而懸殊其所之者有一方而二三其脈證者有證相類而方不相類者有藥多而證少者有證多而藥少者凡是皆仲景氏之所以能極其變化能致其妙用使後人據以行之者也豈非規則哉不可不循焉夫疾有形而方無形故方有移而隨其疾之形以為之制也故方有形則不足以制矣若有經驗之挾於意則方先疾而有形方既有形則疾無形矣聞無形之能制有形不聞有形之能制無形是故其似而類者之多雖既驗於彼而未必驗於此也方本無有善否能得其宜則皆善矣是故雖不驗於彼而又驗於此矣此經驗之不足貴也而方豈有善否哉夫雖仲景氏之非聖人乎方法之肇於此而吾儕之據於此則於我乎不得不尊奉既尊奉之則不得不竊比諸聖人竊比諸聖人不敢侵先王之尊假微於我之醫則誰敢為強僭哉且視傷寒論方匯之不如是皆窺仲景氏之輕忽未始信其書是以不能通會終始截取其意之所應至其所不應則必罪叔和曰此必渠之所攙入以塗竄之欲罪叔和之意先翳膜其目是以仲景氏之所要論亦或塗竄以斥之不辨其所論之脈證即為規則去其規則特取其方豈不亦妄乎脈證本也處方末也去本而取末是以忽看藥味而推之於理謂方有某某之藥宜治某某之證此其妄之始也既配每藥於每證而不厭加之以加減此其妄之終也是所謂無寸之尺無星之稱已惡識仲景氏之規則哉大抵古人之舉事以述義也撰其可以規則於後來者編之於書以傳焉而已豈若後之專貪名利之比哉不可不信矣孟軻氏有言云盡信書不若無書此惟疑尚書之言之侈已非博斥書籍之言也觀下文顯曰於武成取二三策可以見矣後人誤以為博斥書籍者也設令博斥書籍我則反孟軻氏幡然而更曰不盡信書不若無書嗚呼難哉生於今之時而明於古之術也若不信其書將何之信乎我之於仲景氏雖未能盡明其義以行其術於今乎獨信其書而不疑者也且其不稱仲景氏之流而稱古方家者豈亦有所忌耶無論其取之於仲景氏他雜取諸氏之方法則獨稱仲景氏之流此似有所支矣故博稱古方家以遁乎辭而已此豈其所以不稱仲景氏之流耶夫方法之有古今也歧為二途者如前所辨矣於是建極於仲景氏而弘道於孫王二氏則古之於方法莫不概備焉雖然疾病之變態百出不可得而窮詰也雖宋元諸氏之遂還轅軛擅攪舊轍乎非全無一二之所得矣乃取其所得以應夫變態百出則亦足以博吾之術豈不亦愈快哉醫之為術雖固多端而自有要領矣故不求其多端於遠而求要領於邇是之謂善擇也既善擇而善行於今則又何言古今哉雖然有本而有末有古而有今本不立則末必紊不識古則焉辨今方法之肇於仲景氏也建極於此以識乎古能識乎古體之於我則我後於宋元而能辨其為今然後擇之以古以古御今則今猶古乎夫既辨今之在於識古則古今何不言也故必先建之極而後古今可得而言矣是之謂本立而末不紊也方法之言古今也以其必驗於疾為要矣有迂闊者有捷徑者有迂闊而捷徑者有捷徑而迂闊者故不可不善擇焉然後言無古今何為不可乎亦惟在其人亦惟在其人矣記曰忠信之人可以學禮也我於吾之術亦云苟不有忠信之質則烏能盡仲景氏之術矣乎哉不可不慎焉
