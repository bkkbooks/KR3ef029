body:
  text: 卷三疼痛二道疼痛之有陰陽也其凡二道焉而治法則其綱五矣何謂其凡二道也乃其於陽也必乎熱是桂枝麻黃之所之也其於陰也必乎寒是附子之所之也必乎熱者主其發之也必乎寒者主其溫之也此為疼痛之別矣而治法則其綱五者何謂也一者剬在於陽位也二者在於陽位而始及於陰位也三者陰陽相雜也四者剬在於陰位也五者剬在於陰位而波及於陽位也此五綱者有次有序審其條目以臨其病以處其方則千變萬轉一而萬萬而一會其有極歸其有極也而其條目分為十有八其剬在於陽位者凡三焉論曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之曰太陽病脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之曰傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之此其剬在於陽位者之治法也其在於陽位而始及於陰位者凡二焉論曰太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之曰發汗後身疼痛脈沉遲者桂枝加芍藥生薑人參新加湯主之此其在於陽位面始及於陰位者之治法也其陰陽相雜者凡四焉論曰傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便難小便自利者去桂枝加白朮湯主之曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之曰霍亂頭痛身疼痛熱多欲飲水者五苓散主之此其陰陽相雜者之治法也其剬在於陰位者凡五焉論曰少陰病身體痛手足寒骨節痛脈沉者附子湯主之曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者真武湯主之曰大汗出熱不去內拘急四肢疼又下利厥冷而惡寒者曰吐利汗出發熱惡寒四肢拘急手足厥冷者皆四逆湯主之曰吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯主之此其在於陰位者之治法也其剬在於陰位而波及於陽位者凡四焉論曰傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯曰病發熱頭痛脈反沉若不差身體疼痛當救其里宜四逆湯曰下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯曰霍亂頭痛發熱身疼痛寒多不用水者理中丸主之吐利止而身痛不休者當消息和解其外宜桂枝湯此其剬在於陰位而波及於陽位者之治法也疼痛之於陰陽亦惟寒熱之分而其治法之所由歧如此矣不可不審焉且桂枝麻黃之所之也雖均之在於陽位而各有其分存焉則亦不可無辨矣乃其熱之熾且重者此為麻黃之所之也其熱之不甚且輕者此為桂枝之所之也故惟於桂枝乎曰為解肌曰消息和解其外然則桂枝之所之也在其尤輕者也故桂枝而伍之於附子雖之於陰陽相雜者而其證尤甚於陰位而附子之為主於是乎其用附子或至二枚三枚又或因大便鞕去桂枝而加朮此以其不甚於陽位故也又先四逆湯理中丸而後桂枝湯者亦惟剬於陰位而微於陽位者也桂枝麻黃之於辨輕重之分大抵為然亦不可不審焉又如瘡家之身疼痛不在於此數也煩躁四道煩躁之歧以陰陽也亦猶疼痛之別矣而又有因大汗出或下利者有因火逆者凡四道焉乃其於陽也必以熱是即大青龍湯白虎湯承氣湯陷胸湯等之所之也其於陰也必以寒是即乾薑甘草湯乾薑附子湯四逆湯茯苓四逆湯通脈四逆湯吳茱萸湯等之所之也此二道之別煩躁之最重者也其因大汗出或下利者必以渴之與小便不利是即五苓散豬苓湯等之所之也而一則在陽位一則在陰位者也其因火逆者或驚狂或清血或腰以下重而痹是即桂枝去芍藥加蜀漆牡蠣龍骨救逆湯桂枝甘草龍骨牡蠣湯等之所之也而尚在陽位者也此四道者煩躁之別也不可不審矣如梔子豉湯之於反覆轉倒則煩躁之太甚者也如梔子厚朴湯救逆湯之於起臥不安則煩躁之稍輕者也如大柴胡湯調胃承氣湯梔子乾薑湯之於微煩則但煩而不躁者也而其於證非無輕重亦皆在陽位者也亦不可不審矣不曰少而曰微微如幽微之微隱邃而不大顯之義與少小異如微熱亦然故屬之身熱也煩但訓熱者未盡其義也蓋不可情狀而困悶擾撓謂之煩也躁也者擾動展轉四支也故雖煩躁連言而義之自別如此矣論中有不煩而躁者可以見已他如曰反煩不解曰更煩曰心煩曰胸煩曰心中滿而煩曰心中懊憹而煩曰虛煩曰鬱郁微煩曰煩熱曰煩渴曰煩疼曰煩滿曰煩驚曰煩悸曰發煩之類亦皆取義於此而名焉豈可但訓熱之為盡也矣哉汗二道附發汗之辨凡汗之別其本為二道也一為陽一為陰陽主熱陰主寒而其治法之綱七而其目則三十有八也汗本是一身之津液也而其所委源全在於胃焉故胃焉者津液之原也乃其漏乎外也名以為汗夫汗之發於外一也而或熱或寒各殊其候既各殊其候而一於津液焉雖熱之可畏不若寒之太甚此陰陽之所以分也三陽之主熱而有汗也在太陽則發熱惡寒漐漐汗出此其邪之在肌表而其最淺者也在陽明則不惡寒反惡熱濈然汗出此其邪之既入於胃而其最深者也在少陽則往來寒熱非頭汗則盜汗出此其邪之在胸脅而深於太陽淺於陽明者也三陰之主寒而有汗也專於厥陰其於太陰與少陰也治法則不與焉於太陰則不在身而但在頭但在頭者必發黃由瘀熱也治法則猶屬於陽明也於少陰則雖曰屬治法則視於厥陰也故於太陰與少陰也治法則不與焉於厥陰則雖或發熱脈不來四支厥冷大汗出此其篤革之極將外馳內竭者也豈非寒熱之殊其候而一於津液雖熱之可畏不若寒之太甚乎此其陰陽之辨也於是其於太陽也發之以桂枝以葛根此以其在肌表也其於陽明也或挫之以白虎或下之以承氣此以其在於胃也其於少陽也制之以柴胡此以其在胸脅也於太陰則治法在陽明於少陰則治法在厥陰其於厥陰也固非可汗亦非可下掇收之牢固之使其不外馳內竭者惟四逆之力也而其力之尚不能衡其勢於是乎有通脈及加豬膽汁之略也此豈非特篤革之極乎是其治法之概也乃立之綱而其目附之何謂七綱三十有八目乎其一為純於表之綱而其目凡七焉論曰太陽病頭痛發熱汗出惡風者桂枝湯主之曰太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之曰服桂枝湯大汗出脈洪大者與桂枝湯如前法曰病人藏無他病時發熱自汗出不愈者先其時發汗則愈宜桂枝湯曰傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之曰陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯此皆純於表者也其二為自里達表之綱而其目凡十焉論曰陽明病其人多汗以津液外出胃中躁大便必鞕鞕則讝語小承氣湯主之曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已鞕也曰傷寒四五日脈沉而喘滿汗出讝語者以有燥屎在胃中也須下之曰二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而讝語者下之則愈皆大承氣湯主之曰三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿若自汗出者白虎湯主之曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之曰陽明病汗出多而渴者不可與豬苓湯按此蓋白虎加人參湯之所之也曰陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導曰陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之曰陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之按此二條皆陽明之變證也此皆自里達表者也其三為自表裡間而達表之綱而其目凡六焉論曰傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之曰傷寒發熱汗出不解心下痞鞕嘔吐而下利者大柴胡湯主之曰傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但頭微汗出者此為水結在胸脅也曰太陽病脈浮而動數頭痛發熱微盜汗出而反惡寒者表未解也按此蓋小柴胡湯之所之也曰三陽合病脈浮大但欲睡眠目合則汗按此蓋柴胡證之脫簡者也曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之此皆自表裡間而達表者也其四為仍在陽位而稍已轉之綱而其目凡三焉論曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之曰發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯曰太陽病發汗後大汗出胃中干煩躁不得眠若脈浮小便不利微熱消渴者與五苓散主之此皆仍在陽位而稍已轉者也其五為陰陽相錯之綱而其目凡三焉論曰太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急按此蓋桂枝加附子湯之所之也曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之此皆陰陽相錯者也其六為遂之於陰位之綱而其目凡二焉論曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之曰心下痞而復惡寒汗出者附子瀉心湯主之此皆遂之於陰位者也其七為純於陰之綱而其目凡八焉論曰病人脈陰陽俱緊反汗出者此屬少陰曰少陰病下利脈微澀喘而汗出必數更衣反少者當溫其上灸之曰傷寒六七日不利便發熱而利其人汗出不止者死按此三條蓋皆四逆湯之所之也曰大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者曰大汗若大下利而厥冷者曰吐利汗出發熱惡寒四肢拘急手足厥冷者曰既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者皆四逆湯主之曰下利清穀裡寒外熱汗出而厥者通脈四逆湯主之曰吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯主之此皆純於陰者也是之為七綱三十有八目也汗之有陰陽也其於寒與熱治法之備如此不可不辨焉大抵發汗之法在二三日而日分一劑三服其輕者一服汗出病瘥停後服不必盡劑其重者半日許令三服盡晝夜服至二三劑此為其大法矣至其不解者不止二三日雖八九日十日以上尚可發汗也若其在二三日而心悸者不可發汗當與小建中湯又其在二三日已發汗不解蒸蒸發熱者當與調胃承氣湯若雖既及陽明仍發熱惡寒則亦尚可發汗至其不惡寒惡熱當下之此為其變法矣脈證之轉機固不可以幾豈惟汗下哉不可不審察焉夫太陽之發之於汗也陽明之祛之於下也汗下皆耗津液之道也此何以行之乎以其不得止也何以不得止乎以其非此則無可除之道也是故其行之在一旦而不敢強也因戒其發汗曰不可令如水流漓病必不除又曰若一服汗出病瘥停後服又曰脈微弱者不可發汗戒其下之曰微和胃氣勿令大泄下又曰若更衣者勿服之又曰若一服讝語止更莫復服又曰不轉失氣者慎不可攻也惟治法為爾此豈非其行之在一旦而不敢強乎若果強之則鮮不之於陰位焉於是乎舉或發汗遂漏不止或發汗過多或發汗若下之或大汗出後或大下之後等之變脈證而各具其變治法矣少陽之制之於中位也此何以不行汗下乎以其不在表亦不在裡故汗下皆非其所宜也因戒之曰少陽不可發汗又曰慎勿下之亦惟治法為爾雖爾能得其肯綮則或發熱汗出而解故例曰若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解夫行發汗之藥而汗出固其所也柴胡本是非發汗之藥而反發汗則於法得無背馳乎此殊不然以其非發汗之藥故雖汗出乎於法無有背馳矣若果行之發汗之藥則雖汗出乎病必不除矣故雖均汗出乎在得其肯綮與否而有除與否之差也不啻汗出而解為然其於得屎而解亦無不皆然矣脈證之轉機固不可以幾豈惟汗下哉不可不審察焉消渴四道附承氣白虎之辨消渴亦有陰陽矣而治之之法分為四道焉其於陽也惟專於二陽而熾於陽明太陽不與也其於陰也惟專於二陰而甚於厥陰太陰不與也蓋三陽之主熱也太陽則表之表而太輕且緩故未與於此矣少陽則間乎表裡而重於太陽而輕於陽明故既及於此矣陽明則表之裡而愈重且急故最熾於此矣此因其津液之為熱所耗故也三陰之主寒也太陰則里之初而稍輕且緩故未與於此矣少陰則里之本而重於太陰而輕於厥陰故既及於此矣厥陰則里之末而益重且急故甚於此矣此因其津液之為寒所耗故也此為消渴之別焉消渴之為病或熱或寒雖固有其別而其耗津液則一也夫惟一也是以通三方於陰陽而隨其證也各有法焉渴欲飲水口乾舌燥無論其小便是乃白虎湯之所之也若其小便不利是乃豬苓湯之所之也若小便不利有表證是乃五苓散之所之也三方之各隨其證也如此此之為三法焉又意欲飲水反不渴是乃文蛤散之所之也此雖均欲飲水而反不渴則於證最為輕矣乃與之而不差於是繼及五苓散而已此既曰不渴則雖如不類乎觀乎其繼及五苓散則亦為不太相遠當屬為一法合上三法而為治消渴之四法焉又身黃小便不利渴引水漿者是為茵陳蒿湯之所之也乃如其曰渴引水漿則類矣而不曰欲飲水則不類也惟以其所主之不在於此而在於發黃也又熱利下重欲飲水者是為白頭翁湯之所之也乃如其曰欲飲水則類矣而不曰渴則不類也亦惟以其所主之不在於此而在於下利也又少陰病口燥咽乾者及自利清水色純青心下必痛口乾燥者是皆為大承氣湯之所之也乃如其曰口燥咽乾曰口乾燥則類矣而不曰渴不曰欲飲水則不類也亦惟以其所主之不在於此而在於熱與利也又如小青龍湯小柴胡湯柴胡桂枝幹薑湯等亦皆兼治渴惟兼治之故亦為不類矣凡之六者皆類而不類故不取之於專治渴之法也又有雖渴欲飲水或小便不利乎不可必施治焉者例曰發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈又曰厥陰病渴欲飲水者少少與之愈又曰大下之復發汗小便不利者亡津液故也勿治之得小便利必自愈夫渴之與小便不利固與於病焉而又或有不與於病焉者乃其與於病焉者藥之所能治也其不與於病焉者非藥之所能治也故以先與之水而不施治為法焉可見其慎於藥而不苟施也只是乎知所謂調理之劑古之所必無也故不審其所由而強施之治則妄也與其強施之為妄也不若先其所由是審之無謬也夫然後尚不愈於是乎施治亦為未晚也例又曰渴欲飲水少少與之但以法救之渴者宜五苓散是也不可不慎矣有曰渴欲飲水數升口乾舌燥者有惟曰口燥舌乾而不曰欲飲水者此二者固易混焉易混而又既異焉既異之故方法亦從異焉不可不辨矣乃如其曰欲飲水數升則無論其數飲雖未必至數升而有欲大得水以甘心之意以故形容其情狀爾不爾既曰渴而復曰欲飲水數升者似乎復而重矣故其渴而欲飲水數升者此則白虎湯之所之也如其惟曰口燥舌乾而不曰欲飲水則雖本無其欲大飲之意乎惟其乾燥之太甚非潠以潤之必有所不堪以故時飲而快意爾不爾不曰渴又不曰欲飲水者似乎遺而失矣故其不渴而不欲多飲水者此則承氣湯之所之也此二者之易混也若此若此而又既異也若此夫若此之故方法之從異也亦若此焉此二湯之所之之辨也夫既辨此之辨而後又有辨焉亦不可不辨矣大抵此二者之於證皆陽明也陽明也者主乎胃焉胃焉者津液之府也而熱極於茲矣是故熱既及於胃則津液為其所驅而汗自出口乾燥而渴大便非難則鞕此其熱之客於肌膚名為身熱若熱既入於胃則津液愈所耗而汗愈多口愈燥舌愈干大渴而煩或讝語大便非鞕則不大便此其熱之鬱於分肉名為惡熱若熱既結於胃則津液益所竭而汗亦多口益燥舌益干讝語煩躁非不大便則燥屎此其熱之常匿而微顯以時大發名為潮熱惟陽明也者熱之極也是以詳悉其情狀歧名以為三者亦足以見其輕重矣雖乃有其熱之或及或入或結之別乎其及乎口燥舌乾之與於津液則一也而如其既及者與既入者則渴欲飲水至乎其既結者則不欲多飲此似乎其所以輕者反重其所以重者反輕何耶惟其既及者與既入者之所以渴欲飲水者此其熱之猶在於膚之與肉而勢達乎外者也於是乎渴欲飲水爾較之其結者則為稍輕矣惟其既結者之所以不欲多飲者此其熱之常匿而微顯但當其大發之時少不得不渴則鮮其達乎外之勢者也於是乎不欲多飲爾較之其及者與入者則為太重矣一則以渴欲飲水為之證與之白虎湯以挫其既及既入之熱也一則以不欲多飲為之證與之承氣湯以走其既結之熱也或挫之或走之雖術之如不齊乎至於其救津液則一也是之為後之辨焉夫雖既能辨前之所辨之辨而又不復辨此之辨則何術之施也矣哉故亦不可不辨矣又有因瘀血而口燥舌乾或消渴者亦不為不易混而脈證各有其分具焉則又何可混也矣哉辨詳於瘀血之篇可以審焉已矣腹滿二道腹滿亦有陰陽矣其凡二道焉而治法則十有九也陽之主熱也陰之主寒也熱之與寒皆為腹滿焉而太陽少陽之在於肌表與胸脅也則不及於此矣惟發汗吐下之後或為腹滿者既是非其本位也至於陽明乃為腹滿者以其熱之實於胃也腹滿本是太陰之所分而非陽明之所分也陽明之薄於太陰而其熱之熾遂延於其鄰以為腹滿者也此其於腹滿是之為陽位矣太陰之為腹滿者以其寒之客於腹此為其正位也少陰厥陰之為腹滿者此二者亦不遠於太陰而其寒之凝升達於其上者也此其於腹滿是之為陰位矣陰陽之別在於寒之與熱寒熱之分在於胃實之與自利腹診之差在於鞕之與濡脈候之辨在於浮之與沉此為其概矣腹滿之雖太陰之所分乎析為寒熱二者焉熱之極於胃實也雖滿之在於腹乎下之而瘳故其於方劑以承氣湯為之主也寒之極於自利也雖滿之在於腹乎溫之而痊故其於方劑以四逆湯為之主也即其在於陽位者之於治法凡八焉論曰陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已鞕也大承氣湯主之曰若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下曰發汗不解腹滿痛者急下之曰大下後六七日不大便煩不解腹滿痛者此有燥屎也曰腹滿不減減不足言當下之皆宜大承氣湯曰傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之曰太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹鞕滿而痛不可近者大陷胸湯主之曰傷寒吐後腹脹滿者與調胃承氣湯此皆其在於陽位者之治法也其在於陽位而證之相交者之於治法凡四焉論曰陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之曰三陽合病腹滿身重難以轉側口不仁而面垢讝語遺尿若自汗出者白虎湯主之曰陽明中風脈眩浮大而短氣腹部滿脅下及心痛又按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯此皆其在於陽位而證之相交者之治法也其在於陽位而不及胃實者之於治法凡二焉論曰發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之曰傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之此皆其在於陽位而不及胃實者之治法也其在於陽位而似於陰位者之於治法也論曰太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯是也其自陽位而遂之於陰位者及其不大便者之於治法也論曰本太陽病醫反下之因而腹滿時痛者屬太陰桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之是也其在於陰位者之於治法也論曰下利腹脹滿身體疼痛者先溫其里宜四逆湯是也其在於陰位而不大便者之於治法也論曰少陰病六七日腹脹不大便者急下之宜大承氣湯是也腹滿之有陰陽而其治法之分為十有九者若此不可不審焉且桂枝加大黃湯之於大實痛也大承氣湯之於不大便也亦不可無辨矣彼則本太陽病醫反下之遂及於此而已故不曰太陰病而曰屬而其於證非若口乾舌燥之比也於是乎知其大實痛之非燥屎也所以行大黃芍藥也此則其六七日之前蓋真武湯或附子湯之證遂及於此而已故直曰少陰病而其於證必口乾舌燥者也於是乎知其不大便之果燥屎也所以行之大黃芒硝也之二者之於辨亦不可不審焉腹痛二道腹痛之有陰陽也亦惟以熱以寒其凡二道焉而治法則十有二也乃其寒與熱之為腹痛也亦與其為腹滿無以大異矣腹痛腹滿本是太陰之所分而其定位也雖然熱之或及於此也寒之或逼於此也不得不滿亦不得不痛此二者之所以有陰陽也乃其在於陽位而不實於胃者之於治法凡三焉論曰傷寒陽脈澀陰脈弦腹中急痛者法當先與小建中湯不差者與小柴胡湯曰傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之是也其在於陽位而實於胃者之於治法凡三焉論曰病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也曰發汗不解腹滿痛者急下之曰大下後六七日不大便煩不解腹滿痛者此有燥屎也皆宜大承氣湯是也其自陽位而之於陰位者之於治法凡二焉論曰太陽病醫反下之因而腹滿時痛者屬太陰桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之是也其在於陰位者之於治法凡四焉論曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣真武湯主之曰少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒或腹痛者通脈四逆湯主之是也腹痛之有陰陽而其治法之分為十有二者若此亦不可不審焉又如寒疝及蛔蟲等之於腹痛雖不在於此數乎要皆屬於寒者也是以其於方劑必用附子烏頭乾薑蜀椒之類可以見已燥屎宿食八道燥屎宿食之為匹也其候之之目凡八道焉而其治法則一也熱之入於胃即是燥屎宿食之所成也熱之入於胃其熱但熾而未成物此之謂白虎既已成物而有形此之謂承氣也論曰陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也此其一也曰不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也此其二也曰小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也此其三也曰傷寒五六日脈沉而喘滿汗出讝語者以有燥屎在胃中也此其四也曰大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也此其五也曰下利讝語者有燥屎也此其六也曰下利脈滑而數者有宿食也此其七也曰下利不欲食者以有宿食故也此其八也皆宜大小承氣湯燥屎宿食之為匹也雖分為八而其治法則一也治法之雖一而八者不可不分焉燥屎本是因宿食之為熱所焦而成焉者也蓋素有宿食而熱入於胃則為其勢所扇激而津液必走乎外涸乎內宿食遂焦此燥屎之所以成也而其所以為匹也而其所以一治法也若夫熱之獨恣其勢於內則亦能足焦胃也誰謂屎之益燥獨能不焦胃乎二者不或食養之繼終將繫於命期是故屎之燥不可不下也熱之勢不可不挫也承氣以下之白虎以挫之是之為治法也屎之成燥也熱之恣勢也唯在其緩急而本非有二途則其於治法亦當一之而已此何以二之耶夫屎之物而有形熱之邪而無形不可得而一也有形之故下而去之於外也無形之故挫以御之於內也此其所以二之也熱之雖二乎其未得物之初孰與其得物之熾耶譬猶火之連就其燥焉當其未得物之初也溉之以水則鮮其不滅矣此即白虎湯之挫之也及其得物之熾也溉之未足以滅不若急徹去夫燥之物不使其連就也此即承氣湯之下之也或溉以水或徹去物至其救火則一也乃挫之乃下之及其除熱則一也惟仲景氏之術為然仲景氏之於術獨具於其候之目與其治法則其可據以行於今者亦惟此而已故燥屎宿食之為匹也於其候之目與其治法豈可不審焉矣哉豈可不審焉矣哉瘀血二道瘀血之成於熱也其綱凡二道焉而吐衄及打撲墜損不與也熱或入血室或結膀胱則能腐其血血之腐也由於瘀熱故命血以瘀也而或血室或膀胱處方之隨其候而異此其綱之所以為二道也乃其入血室也其候之之目凡四焉曰經水適來胸脅下滿如結胸狀讝語一也曰經水適斷如瘧狀往來寒熱發作有時二也曰晝日明瞭暮則讝語如見鬼狀三也曰下血讝語四也是皆小柴胡湯之證也其結膀胱也其候之之目凡八焉曰其人如狂少腹急結血自下一也曰其人發狂少腹鞕滿小便自利二也曰其人善忘屎雖鞕大便反易其色必黑三也曰消穀善飢不大便四也曰一身手足盡熱便血五也曰唇萎舌青口燥但欲漱水而不欲咽胸滿無寒熱腹不滿而言我滿六也曰如熱狀煩滿口乾燥而渴反無熱七也曰下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥八也是即桃核承氣湯抵當湯之證也大抵此二湯之於別在其新久之與其輕重也血自下與畜血急結與鞕滿此為新久輕重之別也口燥但欲漱水而不欲咽此大類乎承氣湯之證惟無寒熱腹不滿為其別也雖或渴乎反無熱此頗異乎白虎湯之證雖或發熱乎少腹裡急亦為其別也若其入血室與結膀胱此二者之於別一則上在於胸脅一則下在於少腹經水適來與血自下經水適斷與久為畜血是之為其別也瘀血之於候也其綱凡二道而其入血室之目四其結膀胱之目八而其於別也若此不可不審焉又如經水不利及過多等則不在此之數也下利六道下利之為證雖區以眾多而其所統亦惟在寒之與熱寒之與熱二者之所以為下利者寒始受之於里者而其為吐利腹痛固其所也惟熱雖始受之於表乎遂內及於胃則亦能為嘔為下利勢之使然也頗似寒而異何以見其異乎此則惟熱是主之為異寒則不主乎熱矣雖下利之相似而寒熱之果異豈可混乎寒熱也者陰陽之謂也此二者之於綱歧以為六焉有合病之自下利者有並病之自下利者或本不可下而反下之利遂不止猶在於陽位也或未可下而數下之利不止遂之於陰位也或因裡熱也或因裡寒也此之為六綱也而其目則四十有二焉是乃隨其轉機而制之者也不可不辨矣合病之自下利者凡三焉論曰太陽與陽明合病者必自下利葛根湯主之曰太陽與少陽合病自下利者黃芩湯主之曰陽明少陽合病必下利其脈滑而數者有宿食也大承氣湯主之此三者皆合病之自下利者也並病之自下利者凡五焉論曰傷寒發熱汗出不解心下痞鞕嘔吐而下利者大柴胡湯主之曰太陽病過經十餘日心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯曰若自下利脈反和者此為內實也宜調胃承氣湯曰陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之曰傷寒汗出解之後心下痞鞕乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之此五者皆並病之自下利者也本不可下而反下之利遂不止猶在於陽位者凡二焉論曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之曰傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞鞕而滿干吐心煩不得安甘草瀉心湯主之此二者皆本不可下而反下之利遂不止猶在於陽位者也未可下而數下之利不止遂之於陰位者凡五焉論曰太陽病外證未除而數下之遂協熱而利利下不止心下痞鞕表裡不解者桂枝人參湯主之曰傷寒服湯藥下利不止心中痞鞕服瀉心湯已復以他藥下之利不止醫以理中與之利益甚赤石脂禹餘糧湯主之曰傷寒醫下之續得下利清穀不止身疼痛者急當救里曰脈浮而遲表熱裡寒下利清穀者皆宜四逆湯曰假令已下之脈數不解而下不止協熱而便膿血者桃花湯主之此五者皆未可下而數下之利不止遂之於陰位者也因裡熱者凡十焉論曰少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之曰熱利下重者白頭翁湯主之曰下利讝語者有燥屎也小承氣湯主之曰下利脈平按之心下鞕者急下之曰下利脈遲而滑者內實也利未欲止當下之曰下利脈反滑當有所去下之乃愈曰下利差後至其年月日復發者以病不盡故也當下之曰下利不欲食者以有宿食也當下之皆宜大承氣湯此十者皆因裡熱者也因裡寒者凡十有七焉論曰自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩曰欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也曰少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣真武湯主之曰少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之曰少陰病下利咽痛胸滿心煩者豬膚湯主之曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之曰大汗若大下利而厥冷者曰大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者曰吐利汗出發熱惡寒四肢拘急手足厥冷者曰既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者曰下利腹脹滿身體疼痛者皆四逆湯主之曰下利清穀裡寒外熱汗出而厥者曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人或面赤色或腹痛或乾嘔或咽痛或利止脈不出者皆通脈四逆湯主之曰惡寒脈微而複利利止亡血也四逆加人參湯主之曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之曰傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐者乾薑黃連黃芩人參湯主之曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之此十有七者皆因裡寒者也是之為四十有二目也下利之為證雖區以眾多而統之於陰陽歧以綱之與目隨其轉機而制之也若此豈可不辨矣哉且燥屎之必讝語也須辨於鄭聲宿食之必滑數也須辨於微澀熱利之與協熱利大不同也里有熱而下利欲飲水者謂之熱利也本里有寒協合外熱以下利者謂之協熱利也熱利則脈數有力協熱利則脈微弱此為其辨也凡是皆寒熱之易混也亦不可不辨矣厥二道厥之為證惟在於二陰焉肇於少陰而極於厥陰太陰則不與也而有寒有熱凡二道焉其綱八而其目三十有三也不惟寒之極能為厥熱之極亦能為厥也其因殊乎內而其證肖乎外外雖肖內果殊故厥之極於厥陰也曰寒曰熱此為其分此其凡之所以為二道也於是有上下之位有輕重之等故其於處方也無不隨以差之此其綱之所以為八而其目之為三十有三也不可不審辨矣厥之設名也凡八焉以物其輕重也少陰曰手足寒厥陰曰厥曰厥寒曰厥冷曰逆冷曰厥逆曰藏厥曰蛔厥此之為厥之八名也而其輕重之於物亦不可不審辨矣寒即溫之反言其人自覺其寒也厥謂微冷也厥寒言外候之微冷而內自覺其寒也至如厥冷逆冷厥逆則不必自覺皆以外候言之也厥逆逆冷皆其冷上及腕肘脛膝者所以名曰逆也藏厥則不但及腕肘脛膝既及其肌膚者也蛔厥則其有將息者也故藏厥重於厥逆逆冷蛔厥輕於藏厥也厥逆逆冷重於厥冷寒之與厥寒輕於厥冷者也故厥本雖名於逆冷而但曰厥則以微冷言之彰矣此之為輕重之物也而厥冷厥逆雖在少陰之位而已屬厥陰者也故少陰之言厥冷厥逆者此始於少陰遂之於厥陰者也太陽之言厥者亦無不皆然矣厥之極於厥陰也其於寒與熱與上下之位與輕重之等則處方之所以隨以差之也故我非執其綱目以臨之則將何以得名之與物相愜而不失乎名正而物定綱舉而目隨所以審辨也何謂八綱三十有三目乎一綱者吐利而厥冷其目凡二焉論曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之此其專於吐而位之在上焉者也曰吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之此其專於利而位之在下焉者也雖吐利厥冷之如一乎惟其於位為爾何以言之觀乎他用吳茱萸湯或曰食谷欲嘔或曰乾嘔吐涎沫頭痛或曰嘔而胸滿則豈非盡專於吐乎故曰位之在上焉者也觀乎他用四逆湯或曰下利清穀裡寒外熱汗出而厥或曰大下利而厥冷或曰下利厥逆而惡寒或曰下利腹脹滿身體疼痛或曰下利清穀內寒外熱脈微欲絕則豈非盡專於利乎故曰位之在下焉者也二綱者結於胸中或嘔而手足寒厥冷其目凡四焉論曰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之按此蓋瓜蒂散之所之也曰病人手足厥冷脈乍緊心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散此其於證也大類於吳茱萸湯之所之然彼則專於嘔吐此則邪實於胸是之為其別也曰若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯按始曰脈弦遲或乍緊而此不言者此蓋微細或弱者也曰嘔而脈弱小便複利身有微熱見厥者難治四逆湯主之此其於證也亦大類於吳茱萸湯之所之然彼則專於嘔吐此則精奪於內是之為其別也一則胸一則內亦惟上下之位爾三綱者下利而厥逆其目凡六焉論曰少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之曰下利厥逆而惡寒者曰大下利而厥冷者皆四逆湯主之曰下利清穀裡寒外熱汗出而厥者曰少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人或面赤色或腹痛或乾嘔或咽痛或利止脈不出者皆通脈四逆湯主之曰少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之按此雖不曰厥乎觀於其曰脈微澀曰溫其上則必當有厥證耳溫字蓋指四逆湯也以其灸足故曰其上耳四綱者不關吐利或利後厥冷其目凡十有二焉論曰若重發汗復加燒針者曰病發熱頭痛脈反沉若不差身體疼痛當救其里曰少陰病脈沉者急溫之皆四逆湯主之按此三條不曰厥者蓋略之也曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非為蛔厥也曰病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱也曰傷寒六七日脈微手足厥冷煩躁者灸厥陰曰傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血曰傷寒脈促手足厥逆者可灸之曰下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死按以上六條蓋皆四逆湯之所之也曰發汗若下之病仍不解煩躁者茯苓四逆湯主之按此不曰厥者蓋略之也曰吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯主之曰傷寒六七日大下後脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之按此方似大可疑本草麻黃條下引此證作麻黃湯亦未可必也五綱者因蛔蟲而厥其目一焉論曰蛔厥者其人當吐蛔令病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之凡此五綱二十有五目者皆專於寒而其最重焉者也六綱者手足寒厥寒厥其目凡四焉論曰得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之曰傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥按此不載治厥之方厥果微冷則於法宜與當歸四逆湯已曰少陰病身體痛手足寒骨節痛脈沉者附子湯主之曰手足厥寒脈細欲絕者當歸四逆湯主之此一綱四目者亦皆專於寒而其稍輕焉者也七綱者熱深而厥深其目凡二焉按此蓋不大便腹鞕滿而痛口乾舌燥或渴者也論曰傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥應下之按此蓋承氣湯之所之也曰傷寒脈滑而厥者里有熱也白虎湯主之此一綱二目者皆專於熱而其最重焉者也八綱者熱微而厥微其目凡二焉論曰少陰病四逆按此雖曰四逆未必厥逆者也其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之曰傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血按此蓋小柴胡湯之所之也此一綱二目者亦皆專於熱而其稍輕焉者也此之為八綱三十有三目也厥之為證惟在於二陰焉肇於少陰而極於厥陰太陰則不與也而有寒有熱有上下之位有輕重之等雖均之為厥乎各有其分別而處方之所以隨以差之者悉具於八綱三十有三目豈可不審辨矣哉厥之極於厥陰也率以發熱逾之以為生之候也而發熱又有其可畏者凡三焉躁不得臥此其一也厥不止此其二也汗出不止此其三也此之為死之候也亦復不可不審辨矣
